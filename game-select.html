<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Game Room — Heartability</title>
<style>

@font-face {
  font-family: "ZoesHandwriting";
  src: url("assets/fonts/ZoesHandwriting-Regular.ttf") format("truetype");
}

@font-face {
  font-family: "PFPixelscript";
  src: url("assets/fonts/PF Pixelscript Pro Regular.ttf") format("truetype");
}

* { margin: 0; padding: 0; box-sizing: border-box; }

:root {
  --font-hand:  "ZoesHandwriting", cursive;
  --font-pixel: "PFPixelscript", cursive;
  --floor-h:    30vh;
  --wall-bg:    #f5f0ea;
}

body {
  width: 100vw;
  height: 100vh;
  overflow: hidden;
  background: var(--wall-bg);
  user-select: none;
}

/* ── ROOM ──────────────────────────────────────── */

.room {
  position: relative;
  width: 100%;
  height: 100%;
}

/* ── FLOOR ─────────────────────────────────────── */

.floor {
  position: absolute;
  bottom: 0;
  left: 0;
  width: 100%;
  height: var(--floor-h);
  z-index: 1;
  pointer-events: none;
}

.floor img {
  width: 100%;
  height: 100%;
  object-fit: cover;
  object-position: top center;
  display: block;
}

/* ── TOPBAR ────────────────────────────────────── */

.topbar {
  position: absolute;
  top: 20px;
  left: 0;
  right: 0;
  z-index: 10;
  pointer-events: none;
}

.back-btn {
  position: absolute;
  left: 24px;
  top: 0;
  display: inline-block;
  padding: 6px 18px;
  text-decoration: none;
  font-family: var(--font-pixel);
  font-size: 20px;
  color: #3a2000;
  background: #fdf6e3;
  border: 3px solid #3a2000;
  outline: 2px solid #f0c060;
  outline-offset: -4px;
  box-shadow: 2px 3px 0 2px rgba(0,0,0,0.3);
  transition: transform 0.08s, box-shadow 0.08s;
  cursor: pointer;
  pointer-events: all;
}

.back-btn:hover  { transform: translate(-1px,-1px); box-shadow: 3px 4px 0 2px rgba(0,0,0,0.3); }
.back-btn:active { transform: translate(2px,3px); box-shadow: none; }

.room-sign {
  position: absolute;
  left: 50%;
  top: 4px;
  transform: translateX(-50%);
  font-family: var(--font-pixel);
  font-size: clamp(32px, 5.5vw, 68px);
  color: #5a5060;
  text-shadow: 1px 2px 0 rgba(0,0,0,0.14);
  white-space: nowrap;
  text-align: center;
  pointer-events: none;
}

/* ── WALL CONTAINER ────────────────────────────── */
/*
  Everything — wall art, characters, doorway — lives
  inside this one container. All child positions are
  percentages of the container, so the whole scene
  scales as a single unit when the viewport resizes.
*/

.wall-container {
  position: absolute;
  /* sit in the wall area above the floor */
  left: 50%;
  top: 10vh;
  transform: translateX(-50%);
  width: min(92vw, 160vh); /* maintains rough aspect ratio */
  height: calc(100vh - var(--floor-h) - 10vh);
  z-index: 2;
}

/* ── WALL ART ──────────────────────────────────── */

.wall-art {
  position: absolute;
  cursor: pointer;
}

.wall-art a {
  display: block;
  text-decoration: none;
}

.wall-art img {
  display: block;
  width: 100%;
  height: auto;
  filter: drop-shadow(3px 5px 8px rgba(0,0,0,0.2));
  transition: filter 0.2s;
}

.wall-art:hover img,
.wall-art.active img {
  filter: drop-shadow(4px 8px 16px rgba(0,0,0,0.35));
}

@keyframes art-wiggle {
  0%,  100% { transform: rotate(0deg); }
  20%        { transform: rotate(-3deg); }
  40%        { transform: rotate(3deg); }
  60%        { transform: rotate(-2deg); }
  80%        { transform: rotate(2deg); }
}

.wall-art.wiggling {
  animation: art-wiggle 0.48s ease;
}

/* Row 1: map (left) + bingo (centre) — same top */
.art-map {
  left: 2%;
  top: 5%;
  width: 20%;
}

.art-bingo {
  left: 35%;
  top: 5%;
  width: 22%;
}

/* Row 2: bag (centre-left) + mirror (centre-right) — same top */
.art-bag {
  left: 28%;
  top: 46%;
  width: 10%;
}

.art-mirror {
  left: 42%;
  top: 40%;
  width: 20%;
}

/* ── DOORWAY ───────────────────────────────────── */

.doorway {
  position: absolute;
  right: 4%;
  bottom: 0;
  width: 12%;
  /* height driven by aspect ratio via padding trick */
  padding-bottom: 20%;
  height: 0;
  background: linear-gradient(180deg, #a09aaa 0%, #7a7888 100%);
  border-radius: 50% 50% 0 0 / 40% 40% 0 0;
  border: 3px solid #8a8278;
  border-bottom: none;
  cursor: default;
  box-shadow:
    inset 0 0 22px rgba(80,60,130,0.3),
    4px 0 14px rgba(0,0,0,0.18);
}

.doorway::before {
  content: "";
  position: absolute;
  inset: 9px;
  bottom: 0;
  border-radius: 50% 50% 0 0 / 40% 40% 0 0;
  border: 2px solid rgba(220,200,255,0.18);
  border-bottom: none;
  pointer-events: none;
}

.door-lock {
  position: absolute;
  top: 40%;
  left: 50%;
  transform: translate(-50%, -50%);
  font-size: 1.8vw;
  opacity: 0;
  transition: opacity 0.2s;
}

.doorway:hover .door-lock,
.doorway.locked .door-lock { opacity: 1; }

/* ── CHARACTER ANIMATIONS ──────────────────────── */

@keyframes intro-wiggle {
  0%   { transform: rotate(0deg) scale(1); }
  18%  { transform: rotate(-11deg) scale(1.06); }
  38%  { transform: rotate(11deg) scale(1.06); }
  58%  { transform: rotate(-6deg) scale(1.02); }
  78%  { transform: rotate(6deg) scale(1.02); }
  100% { transform: rotate(0deg) scale(1); }
}

@keyframes idle-pulse {
  0%,  100% { transform: translateY(0)    rotate(-2deg) scale(1); }
  50%        { transform: translateY(-4%) rotate(2deg)  scale(1.03); }
}

@keyframes hover-bounce {
  0%,  100% { transform: translateY(0)    rotate(-3deg) scale(1.07); }
  50%        { transform: translateY(-6%) rotate(3deg)  scale(1.11); }
}

/* ── CHARACTER GROUPS ──────────────────────────── */

.char-group {
  position: absolute;
  display: flex;
  flex-direction: column;
  align-items: center;
  cursor: pointer;
  z-index: 5;
}

.char-img {
  display: block;
  width: 100%;
  height: auto;
  filter: drop-shadow(0 4px 10px rgba(0,0,0,0.28));
  animation:
    intro-wiggle 0.85s ease-out 0.35s 1 backwards,
    idle-pulse   3.6s ease-in-out 1.5s infinite;
}

.char-group.active .char-img {
  animation: hover-bounce 0.55s ease-in-out infinite;
}

/* ── THOUGHT BUBBLES ───────────────────────────── */

.thought-bubble {
  position: absolute;
  background: rgba(255, 255, 255, 0.93);
  border-radius: 18px;
  padding: 11px 16px;
  font-family: var(--font-hand);
  font-size: clamp(11px, 1.2vw, 15px);
  color: #5a3a7a;
  text-align: center;
  line-height: 1.35;
  filter: drop-shadow(2px 4px 8px rgba(0,0,0,0.22));
  opacity: 0;
  pointer-events: none;
  transition: opacity 0.22s ease;
  z-index: 20;
  white-space: nowrap;
  /* default: above the character */
  bottom: calc(100% + 16px);
  left: 50%;
  transform: translateX(-50%);
}

.thought-bubble::after {
  content: '';
  position: absolute;
  top: 100%;
  left: 50%;
  transform: translateX(-50%);
  width: 7px; height: 7px;
  border-radius: 50%;
  background: rgba(255,255,255,0.93);
  box-shadow:
    0 12px 0 -2px rgba(255,255,255,0.93),
    0 22px 0 -4px rgba(255,255,255,0.93);
}

.char-group.active .thought-bubble { opacity: 1; }

/* ── CHARACTER POSITIONS ───────────────────────── */

/* Cloud — below the map, left side, floats on wall */
.char-cloud {
  left: 2%;
  top: 38%;
  width: 9%;
}

/* bubble to the right */
.char-cloud .thought-bubble {
  bottom: 50%;
  left: calc(100% + 14px);
  transform: translateY(50%);
}
.char-cloud .thought-bubble::after {
  top: 50%; left: -7px;
  transform: translateY(-50%);
  box-shadow:
    -13px 0 0 -2px rgba(255,255,255,0.93),
    -22px 0 0 -4px rgba(255,255,255,0.93);
}

/* Sun — upper right, room guide */
.char-sun {
  right: 4%;
  top: 4%;
  width: 9%;
}

/* bubble below */
.char-sun .thought-bubble {
  bottom: auto;
  top: calc(100% + 16px);
  left: 50%;
  transform: translateX(-50%);
}
.char-sun .thought-bubble::after {
  top: auto;
  bottom: 100%;
  left: 50%;
  transform: translateX(-50%);
  box-shadow:
    0 -12px 0 -2px rgba(255,255,255,0.93),
    0 -22px 0 -4px rgba(255,255,255,0.93);
}

/* Square — floor left */
.char-square {
  left: 8%;
  bottom: 2%;
  width: 8%;
}

/* Star — floor centre */
.char-star {
  left: 38%;
  bottom: 2%;
  width: 9%;
}

/* Lightning — floor right, near door */
.char-lightning {
  right: 18%;
  bottom: 2%;
  width: 8%;
}

</style>
</head>
<body>

<div class="room">

  <!-- FLOOR IMAGE -->
  <div class="floor">
    <img src="assets/elements/floor.png" alt="" aria-hidden="true">
  </div>

  <!-- TOPBAR -->
  <div class="topbar">
    <a class="back-btn" href="index.html">← home</a>
    <h1 class="room-sign">choose a game</h1>
  </div>

  <!-- ── WALL CONTAINER — everything inside scales together ── -->
  <div class="wall-container">

    <!-- WALL ART -->
    <div class="wall-art art-map" id="art-map">
      <a href="heartability-treasure-map.html">
        <img src="assets/elements/map.png" alt="Treasure Map game">
      </a>
    </div>

    <div class="wall-art art-bingo" id="art-bingo">
      <a href="heartability-bingo-v2.html">
        <img src="assets/elements/bingo.png" alt="Bingo game">
      </a>
    </div>

    <div class="wall-art art-bag" id="art-bag">
      <a href="inventory-builder.html">
        <img src="assets/elements/bag.png" alt="What's in my bag game">
      </a>
    </div>

    <div class="wall-art art-mirror" id="art-mirror">
      <a href="character-builder.html">
        <img src="assets/elements/mirror.png" alt="Infinity Mirror game">
      </a>
    </div>

    <!-- DOORWAY -->
    <div class="doorway" tabindex="0" role="button" aria-label="Library — coming soon">
      <span class="door-lock" aria-hidden="true">🔒</span>
    </div>

    <!-- CHARACTERS -->

    <!-- Cloud → Treasure Map -->
    <div class="char-group char-cloud" id="char-cloud">
      <div class="thought-bubble">sometimes following your dreams requires a map</div>
      <img class="char-img" src="assets/elements/guides/cloud.png" alt="Cloud character">
    </div>

    <!-- Sun → Room guide -->
    <div class="char-group char-sun" id="char-sun">
      <div class="thought-bubble">welcome! pick a game to begin</div>
      <img class="char-img" src="assets/elements/guides/sun.png" alt="Sun character">
    </div>

    <!-- Square → Inventory -->
    <div class="char-group char-square" id="char-square">
      <div class="thought-bubble">what's in your bag? let's make sure you are prepared!</div>
      <img class="char-img" src="assets/elements/guides/square.png" alt="Square character">
    </div>

    <!-- Star → Infinity Mirror -->
    <div class="char-group char-star" id="char-star">
      <div class="thought-bubble">you can be anybody you want (without cutting bangs)</div>
      <img class="char-img" src="assets/elements/guides/star.png" alt="Star character">
    </div>

    <!-- Lightning → Bingo -->
    <div class="char-group char-lightning" id="char-lightning">
      <div class="thought-bubble">how are you really feeling? let's check in</div>
      <img class="char-img" src="assets/elements/guides/lightning.png" alt="Lightning bolt character">
    </div>

  </div><!-- /wall-container -->

</div><!-- /room -->

<script>
(function () {

  const pairs = [
    { charId: 'char-cloud',     artId: 'art-map'    },
    { charId: 'char-square',    artId: 'art-bag'    },
    { charId: 'char-star',      artId: 'art-mirror' },
    { charId: 'char-lightning', artId: 'art-bingo'  },
  ];

  function triggerWiggle(artEl) {
    artEl.classList.remove('wiggling');
    void artEl.offsetWidth;
    artEl.classList.add('wiggling');
    artEl.addEventListener('animationend', () => artEl.classList.remove('wiggling'), { once: true });
  }

  pairs.forEach(function ({ charId, artId }) {
    const char = document.getElementById(charId);
    const art  = document.getElementById(artId);
    if (!char || !art) return;

    function activate() { char.classList.add('active'); triggerWiggle(art); }
    function deactivate() { char.classList.remove('active'); }

    char.addEventListener('mouseenter', activate);
    char.addEventListener('mouseleave', deactivate);
    art.addEventListener('mouseenter',  activate);
    art.addEventListener('mouseleave',  deactivate);
  });

  const sun = document.getElementById('char-sun');
  if (sun) {
    sun.addEventListener('mouseenter', () => sun.classList.add('active'));
    sun.addEventListener('mouseleave', () => sun.classList.remove('active'));
  }

  const door = document.querySelector('.doorway');
  if (door) {
    door.addEventListener('click', function () {
      door.classList.add('locked');
      setTimeout(() => door.classList.remove('locked'), 1000);
    });
  }

})();
</script>

</body>
</html>
