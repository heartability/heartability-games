<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Game Room — Heartability</title>
<style>

@font-face {
  font-family: "ZoesHandwriting";
  src: url("assets/fonts/ZoesHandwriting-Regular.ttf") format("truetype");
}

@font-face {
  font-family: "PFPixelscript";
  src: url("assets/fonts/PF Pixelscript Pro Regular.ttf") format("truetype");
}

* { margin: 0; padding: 0; box-sizing: border-box; }

:root {
  --font-hand:  "ZoesHandwriting", cursive;
  --font-pixel: "PFPixelscript", cursive;
  --floor-h:    30vh;
  --wall-bg:    #f5f0ea;
}

body {
  width: 100vw;
  height: 100vh;
  overflow: hidden;
  background: var(--wall-bg);
  user-select: none;
}

/* ── ROOM ──────────────────────────────────────── */

.room {
  position: relative;
  width: 100%;
  height: 100%;
}

/* ── FLOOR ─────────────────────────────────────── */

.floor {
  position: absolute;
  bottom: 0;
  left: 0;
  width: 100%;
  height: var(--floor-h);
  z-index: 1;
  pointer-events: none;
}

.floor img {
  width: 100%;
  height: 100%;
  object-fit: cover;
  object-position: top center;
  display: block;
}

/* ── TOPBAR ────────────────────────────────────── */

.topbar {
  position: absolute;
  top: 20px;
  left: 0;
  right: 0;
  z-index: 10;
  pointer-events: none;
}

.back-btn {
  position: absolute;
  left: 24px;
  top: 0;
  display: inline-block;
  padding: 6px 18px;
  text-decoration: none;
  font-family: var(--font-pixel);
  font-size: 20px;
  color: #3a2000;
  background: #fdf6e3;
  border: 3px solid #3a2000;
  outline: 2px solid #f0c060;
  outline-offset: -4px;
  box-shadow: 2px 3px 0 2px rgba(0,0,0,0.3);
  transition: transform 0.08s, box-shadow 0.08s;
  cursor: pointer;
  pointer-events: all;
}

.back-btn:hover  { transform: translate(-1px,-1px); box-shadow: 3px 4px 0 2px rgba(0,0,0,0.3); }
.back-btn:active { transform: translate(2px,3px); box-shadow: none; }

.room-sign {
  position: absolute;
  left: 50%;
  top: 4px;
  transform: translateX(-50%);
  font-family: var(--font-pixel);
  font-size: clamp(32px, 5.5vw, 68px);
  color: #5a5060;
  text-shadow: 1px 2px 0 rgba(0,0,0,0.14);
  white-space: nowrap;
  text-align: center;
  pointer-events: none;
}

/* ── WALL ART ──────────────────────────────────── */

.wall-art {
  position: absolute;
  z-index: 3;
  cursor: pointer;
}

.wall-art a {
  display: block;
  text-decoration: none;
}

.wall-art img {
  display: block;
  width: 100%;
  height: auto;
  filter: drop-shadow(3px 5px 8px rgba(0,0,0,0.2));
  transition: filter 0.2s;
}

.wall-art:hover img,
.wall-art.active img {
  filter: drop-shadow(4px 8px 16px rgba(0,0,0,0.35));
}

@keyframes art-wiggle {
  0%,  100% { transform: rotate(0deg); }
  20%        { transform: rotate(-3deg); }
  40%        { transform: rotate(3deg); }
  60%        { transform: rotate(-2deg); }
  80%        { transform: rotate(2deg); }
}

.wall-art.wiggling {
  animation: art-wiggle 0.48s ease;
}

/* Wall art positions */
.art-map {
  left: 3%;
  top: 28%;
  width: clamp(130px, 17vw, 240px);
}

.art-bingo {
  left: 38%;
  top: 14%;
  width: clamp(150px, 19vw, 270px);
}

.art-bag {
  left: 29%;
  top: 48%;
  width: clamp(70px, 9vw, 125px);
}

.art-mirror {
  left: 49%;
  top: 37%;
  width: clamp(130px, 17vw, 230px);
}

/* ── DOORWAY ───────────────────────────────────── */

.doorway {
  position: absolute;
  right: 7%;
  bottom: calc(var(--floor-h) - 4px);
  width: clamp(80px, 10vw, 135px);
  height: clamp(140px, 18vw, 220px);
  background: linear-gradient(180deg, #a09aaa 0%, #7a7888 100%);
  border-radius: 50% 50% 0 0 / 55% 55% 0 0;
  border: 4px solid #8a8278;
  border-bottom: none;
  z-index: 4;
  cursor: default;
  box-shadow:
    inset 0 0 22px rgba(80,60,130,0.3),
    4px 0 14px rgba(0,0,0,0.18);
  display: flex;
  align-items: center;
  justify-content: center;
}

.doorway::before {
  content: "";
  position: absolute;
  inset: 9px;
  bottom: 0;
  border-radius: 50% 50% 0 0 / 55% 55% 0 0;
  border: 2px solid rgba(220,200,255,0.18);
  border-bottom: none;
  pointer-events: none;
}

.door-lock {
  font-size: clamp(22px, 3vw, 38px);
  position: absolute;
  top: 42%;
  left: 50%;
  transform: translate(-50%, -50%);
  opacity: 0;
  transition: opacity 0.2s;
}

.doorway:hover .door-lock,
.doorway:focus .door-lock,
.doorway.locked .door-lock {
  opacity: 1;
}

/* ── CHARACTER ANIMATIONS ──────────────────────── */

@keyframes intro-wiggle {
  0%   { transform: rotate(0deg) scale(1); }
  18%  { transform: rotate(-11deg) scale(1.06); }
  38%  { transform: rotate(11deg) scale(1.06); }
  58%  { transform: rotate(-6deg) scale(1.02); }
  78%  { transform: rotate(6deg) scale(1.02); }
  100% { transform: rotate(0deg) scale(1); }
}

@keyframes idle-pulse {
  0%,  100% { transform: translateY(0)    rotate(-2deg) scale(1); }
  50%        { transform: translateY(-8px) rotate(2deg)  scale(1.03); }
}

@keyframes hover-bounce {
  0%,  100% { transform: translateY(0)     rotate(-3deg) scale(1.07); }
  50%        { transform: translateY(-14px) rotate(3deg)  scale(1.11); }
}

/* ── CHARACTER GROUPS ──────────────────────────── */

.char-group {
  position: absolute;
  display: flex;
  flex-direction: column;
  align-items: center;
  z-index: 5;
  cursor: pointer;
}

.char-img {
  display: block;
  width: 100%;
  height: auto;
  filter: drop-shadow(0 4px 10px rgba(0,0,0,0.28));
  animation:
    intro-wiggle 0.85s ease-out 0.35s 1 backwards,
    idle-pulse   3.6s ease-in-out 1.5s infinite;
}

.char-group.active .char-img {
  animation: hover-bounce 0.55s ease-in-out infinite;
}

/* ── THOUGHT BUBBLES ───────────────────────────── */

.thought-bubble {
  position: absolute;
  background: rgba(255, 255, 255, 0.93);
  border-radius: 18px;
  padding: 11px 16px;
  font-family: var(--font-hand);
  font-size: clamp(13px, 1.4vw, 16px);
  color: #5a3a7a;
  text-align: center;
  line-height: 1.35;
  filter: drop-shadow(2px 4px 8px rgba(0,0,0,0.22));
  opacity: 0;
  pointer-events: none;
  transition: opacity 0.22s ease;
  z-index: 20;
  max-width: 200px;
  width: max-content;
}

/* Default: bubble appears above, dots pointing down */
.thought-bubble {
  bottom: calc(100% + 20px);
  left: 50%;
  transform: translateX(-50%);
}

.thought-bubble::after {
  content: '';
  position: absolute;
  top: 100%;
  left: 50%;
  transform: translateX(-50%);
  width: 8px;
  height: 8px;
  border-radius: 50%;
  background: rgba(255, 255, 255, 0.93);
  box-shadow:
    0 13px 0 -2px rgba(255, 255, 255, 0.93),
    0 23px 0 -4px rgba(255, 255, 255, 0.93);
}

.char-group.active .thought-bubble {
  opacity: 1;
}

/* ── CHARACTER POSITIONS & BUBBLE OVERRIDES ─────── */

/* Cloud — upper-left; bubble appears to the RIGHT */
.char-cloud {
  left: 7%;
  top: 14%;
  width: clamp(75px, 10vw, 140px);
}

.char-cloud .thought-bubble {
  bottom: 50%;
  left: calc(100% + 18px);
  transform: translateY(50%);
}

.char-cloud .thought-bubble::after {
  top: 50%;
  left: -8px;
  transform: translateY(-50%);
  box-shadow:
    -14px 0 0 -2px rgba(255, 255, 255, 0.93),
    -24px 0 0 -4px rgba(255, 255, 255, 0.93);
}

/* Sun — upper-right; bubble appears BELOW */
.char-sun {
  right: 7%;
  top: 8%;
  width: clamp(75px, 10vw, 140px);
}

.char-sun .thought-bubble {
  bottom: auto;
  top: calc(100% + 20px);
  left: 50%;
  transform: translateX(-50%);
}

.char-sun .thought-bubble::after {
  top: auto;
  bottom: 100%;
  left: 50%;
  transform: translateX(-50%);
  box-shadow:
    0 -13px 0 -2px rgba(255, 255, 255, 0.93),
    0 -23px 0 -4px rgba(255, 255, 255, 0.93);
}

/* Square — floor level, left */
.char-square {
  left: 16%;
  bottom: var(--floor-h);
  width: clamp(60px, 8vw, 105px);
}

/* Star — floor level, center */
.char-star {
  left: 44%;
  bottom: var(--floor-h);
  transform: translateX(-50%);
  width: clamp(70px, 9vw, 115px);
}

/* Lightning — floor level, right */
.char-lightning {
  right: 20%;
  bottom: var(--floor-h);
  width: clamp(60px, 8vw, 105px);
}

</style>
</head>
<body>

<div class="room">

  <!-- FLOOR IMAGE -->
  <div class="floor">
    <img src="assets/elements/floor.png" alt="" aria-hidden="true">
  </div>

  <!-- TOPBAR -->
  <div class="topbar">
    <a class="back-btn" href="index.html">← home</a>
    <h1 class="room-sign">choose a game</h1>
  </div>

  <!-- ── WALL ART ─────────────────────────────── -->

  <div class="wall-art art-map" id="art-map">
    <a href="heartability-treasure-map.html">
      <img src="assets/elements/map.png" alt="Treasure Map game">
    </a>
  </div>

  <div class="wall-art art-bingo" id="art-bingo">
    <a href="heartability-bingo-v2.html">
      <img src="assets/elements/bingo.png" alt="Bingo game">
    </a>
  </div>

  <div class="wall-art art-bag" id="art-bag">
    <a href="inventory-builder.html">
      <img src="assets/elements/bag.png" alt="What's in my bag game">
    </a>
  </div>

  <div class="wall-art art-mirror" id="art-mirror">
    <a href="character-builder.html">
      <img src="assets/elements/mirror.png" alt="Infinity Mirror game">
    </a>
  </div>

  <!-- ── DOORWAY ──────────────────────────────── -->

  <div class="doorway" tabindex="0" role="button" aria-label="Locked door — coming soon">
    <span class="door-lock" aria-hidden="true">🔒</span>
  </div>

  <!-- ── CHARACTERS ───────────────────────────── -->

  <!-- Cloud → Treasure Map -->
  <div class="char-group char-cloud" id="char-cloud">
    <div class="thought-bubble">sometimes following your<br>dreams requires a map</div>
    <img class="char-img" src="assets/elements/guides/cloud.png" alt="Cloud character">
  </div>

  <!-- Sun → Room guide (no game) -->
  <div class="char-group char-sun" id="char-sun">
    <div class="thought-bubble">welcome!<br>pick a game to begin</div>
    <img class="char-img" src="assets/elements/guides/sun.png" alt="Sun character">
  </div>

  <!-- Square → Inventory / What's in my bag -->
  <div class="char-group char-square" id="char-square">
    <div class="thought-bubble">what's in your bag? let's<br>make sure you are prepared!</div>
    <img class="char-img" src="assets/elements/guides/square.png" alt="Square character">
  </div>

  <!-- Star → Infinity Mirror / Character Builder -->
  <div class="char-group char-star" id="char-star">
    <div class="thought-bubble">you can be anybody you want<br>(without cutting bangs)</div>
    <img class="char-img" src="assets/elements/guides/star.png" alt="Star character">
  </div>

  <!-- Lightning → Bingo -->
  <div class="char-group char-lightning" id="char-lightning">
    <div class="thought-bubble">how are you really feeling?<br>let's check in</div>
    <img class="char-img" src="assets/elements/guides/lightning.png" alt="Lightning bolt character">
  </div>

</div><!-- /room -->

<script>
(function () {

  /* ── Character ↔ wall art pairs ─────────────── */

  const pairs = [
    { charId: 'char-cloud',     artId: 'art-map'    },
    { charId: 'char-square',    artId: 'art-bag'    },
    { charId: 'char-star',      artId: 'art-mirror' },
    { charId: 'char-lightning', artId: 'art-bingo'  },
  ];

  function triggerWiggle(artEl) {
    artEl.classList.remove('wiggling');
    void artEl.offsetWidth; /* force reflow to restart animation */
    artEl.classList.add('wiggling');
    artEl.addEventListener('animationend', () => {
      artEl.classList.remove('wiggling');
    }, { once: true });
  }

  pairs.forEach(function ({ charId, artId }) {
    const char = document.getElementById(charId);
    const art  = document.getElementById(artId);
    if (!char || !art) return;

    function activate() {
      char.classList.add('active');
      triggerWiggle(art);
    }

    function deactivate() {
      char.classList.remove('active');
    }

    char.addEventListener('mouseenter', activate);
    char.addEventListener('mouseleave', deactivate);
    art.addEventListener('mouseenter',  activate);
    art.addEventListener('mouseleave',  deactivate);
  });

  /* ── Sun — standalone (no paired wall art) ─── */

  const sun = document.getElementById('char-sun');
  if (sun) {
    sun.addEventListener('mouseenter', () => sun.classList.add('active'));
    sun.addEventListener('mouseleave', () => sun.classList.remove('active'));
  }

  /* ── Doorway — lock on click ────────────────── */

  const door = document.querySelector('.doorway');
  if (door) {
    door.addEventListener('click', function () {
      door.classList.add('locked');
      setTimeout(() => door.classList.remove('locked'), 1000);
    });
  }

})();
</script>

</body>
</html>
