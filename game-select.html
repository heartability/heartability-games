<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Game Room — Heartability</title>
<style>

@font-face {
  font-family: "ZoesHandwriting";
  src: url("assets/fonts/ZoesHandwriting-Regular.ttf") format("truetype");
}

@font-face {
  font-family: "PFPixelscript";
  src: url("assets/fonts/PF Pixelscript Pro Regular.ttf") format("truetype");
}

* { margin: 0; padding: 0; box-sizing: border-box; }

:root {
  --font-hand:  "ZoesHandwriting", cursive;
  --font-pixel: "PFPixelscript", cursive;
  --floor-h:    30vh;
  --base-h:     16px;
  --wall-bg:    #f5f0ea;
  --base-color: #cdc8bd;
  --base-shade: #c7c2b7;
}

body {
  width: 100vw;
  height: 100vh;
  overflow: hidden;
  background: var(--wall-bg);
  user-select: none;
}

/* ─────────────────────────────────────────────────
   FLOOR  z:1
───────────────────────────────────────────────── */

.floor {
  position: fixed;
  bottom: 0;
  left: 0;
  width: 100%;
  height: var(--floor-h);
  z-index: 1;
  pointer-events: none;
}

.floor img {
  width: 100%;
  height: 100%;
  object-fit: cover;
  object-position: top center;
  display: block;
}

/* ─────────────────────────────────────────────────
   BASEBOARD  z:3
───────────────────────────────────────────────── */

.baseboard {
  position: fixed;
  bottom: var(--floor-h);
  left: 0;
  width: 100%;
  height: var(--base-h);
  z-index: 3;
  pointer-events: none;
  background: var(--base-color);
  box-shadow:
    0 -3px 0 0 var(--base-shade),
    0  4px 0 0 #b8b3a8,
    0  7px 5px rgba(0,0,0,0.15);
}

/* ─────────────────────────────────────────────────
   TOPBAR  z:10
───────────────────────────────────────────────── */

.topbar {
  position: fixed;
  top: 20px;
  left: 0;
  right: 0;
  z-index: 10;
  pointer-events: none;
}

.back-btn {
  position: absolute;
  left: 24px;
  top: 0;
  display: inline-block;
  padding: 6px 18px;
  text-decoration: none;
  font-family: var(--font-pixel);
  font-size: 20px;
  color: #3a2000;
  background: #fdf6e3;
  border: 3px solid #3a2000;
  outline: 2px solid #f0c060;
  outline-offset: -4px;
  box-shadow: 2px 3px 0 2px rgba(0,0,0,0.3);
  transition: transform 0.08s, box-shadow 0.08s;
  cursor: pointer;
  pointer-events: all;
}

.back-btn:hover  { transform: translate(-1px,-1px); box-shadow: 3px 4px 0 2px rgba(0,0,0,0.3); }
.back-btn:active { transform: translate(2px,3px);   box-shadow: none; }

.room-sign {
  position: absolute;
  left: 50%;
  top: 4px;
  transform: translateX(-50%);
  font-family: var(--font-pixel);
  font-size: clamp(16px, 2.6vw, 36px);
  color: #5a5060;
  text-shadow: 1px 2px 0 rgba(0,0,0,0.14);
  white-space: nowrap;
  pointer-events: none;
}

/* ─────────────────────────────────────────────────
   WALL ART
   All positioned directly with fixed + vw/vh.
   No container — no phantom gaps.
   Adjust left/top/width to taste.
───────────────────────────────────────────────── */

.wall-art {
  position: fixed;
  cursor: pointer;
  z-index: 2;
}

.wall-art a { display: block; text-decoration: none; }

.wall-art img {
  display: block;
  width: 100%;
  height: auto;
  filter: drop-shadow(3px 5px 8px rgba(0,0,0,0.2));
  transition: filter 0.2s;
}

.wall-art:hover img,
.wall-art.active img {
  filter: drop-shadow(4px 8px 16px rgba(0,0,0,0.35));
}

@keyframes art-wiggle {
  0%,100% { transform: rotate(0deg); }
  20%      { transform: rotate(-3deg); }
  40%      { transform: rotate(3deg); }
  60%      { transform: rotate(-2deg); }
  80%      { transform: rotate(2deg); }
}

.wall-art.wiggling { animation: art-wiggle 0.48s ease; }

/*
  Row 1: map and bingo hang upper-left area of wall
  Row 2: bag and mirror hang lower, spreading toward door
  All left/top/width values are vw/vh so they scale with viewport
*/
.art-map    { left: 15vw;  top: 15vh; width: 22vw; }
.art-bingo  { left: 45vw; top: 15vh; width: 18vw; }
.art-bag    { left: 35vw; top: 42vh; width:  8vw; }
.art-mirror { left: 50vw; top: 36vh; width: 14vw; }

/* ─────────────────────────────────────────────────
   DOOR  z:4
   Right edge = 80px from viewport right.
   Bottom sits on top of baseboard.
───────────────────────────────────────────────── */

.door-img {
  position: fixed;
  right: 80px;
  bottom: calc(var(--floor-h) + var(--base-h));
  width: 22vw;
  height: auto;
  z-index: 4;
  cursor: pointer;
  filter: drop-shadow(-4px 0 8px rgba(0,0,0,0.1));
  transition: filter 0.2s;
}

.door-img:hover {
  filter: drop-shadow(-4px 0 14px rgba(80,60,130,0.35));
}

/* ─────────────────────────────────────────────────
   CHARACTER ANIMATIONS
───────────────────────────────────────────────── */

@keyframes intro-wiggle {
  0%   { transform: rotate(0deg) scale(1); }
  18%  { transform: rotate(-11deg) scale(1.06); }
  38%  { transform: rotate(11deg) scale(1.06); }
  58%  { transform: rotate(-6deg) scale(1.02); }
  78%  { transform: rotate(6deg) scale(1.02); }
  100% { transform: rotate(0deg) scale(1); }
}

@keyframes idle-pulse {
  0%,100% { transform: translateY(0)     rotate(-2deg) scale(1); }
  50%      { transform: translateY(-8px)  rotate(2deg)  scale(1.03); }
}

@keyframes hover-bounce {
  0%,100% { transform: translateY(0)     rotate(-3deg) scale(1.07); }
  50%      { transform: translateY(-14px) rotate(3deg)  scale(1.11); }
}

/* ─────────────────────────────────────────────────
   HEART GUIDE  z:5
───────────────────────────────────────────────── */

.char-heart {
  position: fixed;
  left: 150px;
  bottom: calc(var(--floor-h) - 50px);
  width: clamp(150px, 20vw, 285px);
  display: flex;
  align-items: flex-end;
  cursor: pointer;
  z-index: 5;
}

.char-heart .char-img {
  display: block;
  width: 100%;
  height: auto;
  filter: drop-shadow(0 4px 10px rgba(0,0,0,0.28));
  animation:
    intro-wiggle 0.85s ease-out 0.35s 1 backwards,
    idle-pulse   3.6s ease-in-out 1.5s infinite;
}

.char-heart.active .char-img {
  animation: hover-bounce 0.55s ease-in-out infinite;
}

/* ─────────────────────────────────────────────────
   THOUGHT BUBBLE  z:6
───────────────────────────────────────────────── */

.thought-bubble {
  position: absolute;
  background: rgba(255,255,255,0.96);
  border-radius: 20px;
  padding: 14px 22px;
  font-family: var(--font-hand);
  font-size: clamp(16px, 1.8vw, 22px);
  color: #5a3a7a;
  text-align: center;
  line-height: 1.4;
  filter: drop-shadow(2px 4px 8px rgba(0,0,0,0.18));
  opacity: 0;
  pointer-events: none;
  transition: opacity 0.22s ease;
  z-index: 6;
  white-space: nowrap;
  left: calc(100% + 20px);
  bottom: 30%;
}

.thought-bubble::after {
  content: '';
  position: absolute;
  top: 50%;
  left: -8px;
  transform: translateY(-50%);
  width: 8px; height: 8px;
  border-radius: 50%;
  background: rgba(255,255,255,0.96);
  box-shadow:
    -14px 0 0 -2px rgba(255,255,255,0.96),
    -24px 0 0 -4px rgba(255,255,255,0.96);
}

.char-heart.active .thought-bubble { opacity: 1; }

</style>
</head>
<body>

<!-- FLOOR  z:1 -->
<div class="floor">
  <img src="assets/elements/floor.png" alt="" aria-hidden="true">
</div>

<!-- BASEBOARD  z:3 -->
<div class="baseboard" aria-hidden="true"></div>

<!-- TOPBAR  z:10 -->
<div class="topbar">
  <a class="back-btn" href="index.html">← home</a>
  <h1 class="room-sign">choose a game</h1>
</div>

<!-- WALL ART  z:2 — all fixed, no container -->
<div class="wall-art art-map" id="art-map">
  <a href="heartability-treasure-map.html">
    <img src="assets/elements/map.png" alt="Treasure Map">
  </a>
</div>

<div class="wall-art art-bingo" id="art-bingo">
  <a href="heartability-bingo-v2.html">
    <img src="assets/elements/bingo.png" alt="Bingo">
  </a>
</div>

<div class="wall-art art-bag" id="art-bag">
  <a href="inventory-builder.html">
    <img src="assets/elements/bag.png" alt="What's in my bag">
  </a>
</div>

<div class="wall-art art-mirror" id="art-mirror">
  <a href="character-builder.html">
    <img src="assets/elements/mirror.png" alt="Infinity Mirror">
  </a>
</div>

<!-- DOOR  z:4 -->
<img class="door-img"
     src="assets/elements/door.png"
     alt="Door to the library"
     id="door-img"
     tabindex="0"
     role="button"
     aria-label="Library — coming soon">

<!-- HEART GUIDE  z:5 -->
<div class="char-heart" id="char-heart">
  <div class="thought-bubble" id="heart-bubble"></div>
  <img class="char-img"
       src="assets/elements/guides/heart.png"
       alt="Heart guide character">
</div>

<script>
(function () {

  const heart  = document.getElementById('char-heart');
  const bubble = document.getElementById('heart-bubble');

  const messages = {
    'art-map':    'if you are feeling lost, try making a map',
    'art-bingo':  "how are you really feeling? let's check in",
    'art-mirror': 'you dont have to cut your hair to find yourself',
    'art-bag':    "what's in your bag? let's make sure you are prepared!",
  };

  function triggerWiggle(artEl) {
    artEl.classList.remove('wiggling');
    void artEl.offsetWidth;
    artEl.classList.add('wiggling');
    artEl.addEventListener('animationend',
      () => artEl.classList.remove('wiggling'), { once: true });
  }

  function activate(artId) {
    bubble.textContent = messages[artId] || '';
    heart.classList.add('active');
  }

  function deactivate() { heart.classList.remove('active'); }

  Object.keys(messages).forEach(function (artId) {
    const art = document.getElementById(artId);
    if (!art) return;
    art.addEventListener('mouseenter', () => { activate(artId); triggerWiggle(art); });
    art.addEventListener('mouseleave', deactivate);
  });

  heart.addEventListener('mouseenter', () => {
    bubble.textContent = 'welcome! pick a game to begin';
    heart.classList.add('active');
  });
  heart.addEventListener('mouseleave', deactivate);

  const door = document.getElementById('door-img');
  if (door) {
    door.addEventListener('click', () => {
      door.style.filter = 'drop-shadow(-4px 0 16px rgba(80,60,130,0.5))';
      setTimeout(() => door.style.filter = '', 800);
    });
  }

@media (max-width: 768px) {
  /* art pieces — bigger on mobile */
  .art-map    { left: 2vw;  top: 20vh; width: 28vw; }
  .art-bingo  { left: 34vw; top: 20vh;  width: 36vw; }
  .art-bag    { left: 16vw; top: 38vh; width: 25vw; }
  .art-mirror { left: 52vw; top: 30vh; width: 28vw; }

  /* door — smaller on mobile */
  .door-img {
    width: 28vw;
    right: 10px;
  }

  /* heart — smaller on mobile */
  .char-heart {
    width: clamp(30px, 18vw, 50px);
    left: 2px;
  }

  /* title — smaller */
  .room-sign {
    font-size: clamp(14px, 4vw, 24px);
  }
}
  
})();
</script>

</body>
</html>
