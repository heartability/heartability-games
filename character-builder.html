<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Character Builder — Heartability</title>
<style>

  @font-face {
  font-family: "ZoesHandwriting";
  src: url("assets/fonts/ZoesHandwriting-Regular.ttf") format("truetype");
}

@font-face {
  font-family: "PFPixelscript";
  src: url("assets/fonts/PFPixelscriptProRegular.ttf") format("truetype");
}
  
* { margin: 0; padding: 0; box-sizing: border-box; }

:root {
  --bg: #c8a832;
  --bg-dark: #a88820;
  --panel-bg: #fdf6e3;
  --panel-border-dark: #7a4a10;
  --panel-border-mid: #c8841a;
  --panel-border-light: #f0c060;
  --text-dark: #3a2000;
  --text-mid: #7a4a10;
  --accent: #d44020;
  --font-game: "VT323", monospace;
  --mirror-bg: #ffffff;
}

body {
  min-height: 100vh;
  background: var(--bg);
  font-family: var(--font-game);
  display: flex;
  flex-direction: column;
  overflow-x: hidden;
}

body::before {
  content: "";
  position: fixed;
  inset: 0;
  pointer-events: none;
  background-image:
    repeating-linear-gradient(90deg, transparent, transparent 39px, rgba(0,0,0,0.07) 39px, rgba(0,0,0,0.07) 40px),
    repeating-linear-gradient(0deg, transparent, transparent 39px, rgba(0,0,0,0.04) 39px, rgba(0,0,0,0.04) 40px);
  z-index: 0;
}

.room {
  position: relative;
  z-index: 1;
  display: flex;
  flex-direction: column;
  min-height: 100vh;
}

.wall {
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  padding: 24px 16px 0;
}

h1.room-title {
  font-family: "PFPixelscript", cursive;
  font-size: clamp(32px, 5.5vw, 58px);
  color: #fff8e0;
  text-shadow: 2px 3px 0 rgba(0,0,0,0.35);
  text-align: center;
  margin-bottom: 4px;
  letter-spacing: 2px;
}

.room-subtitle {
  font-family: var(--font-game);
  font-size: clamp(14px, 2.2vw, 19px);
  color: #ffd870;
  text-align: center;
  margin-bottom: 16px;
}

.topbar {
  width: 100%;
  max-width: 1050px;
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 10px;
  gap: 10px;
  flex-wrap: wrap;
}

.instructions {
  font-family: var(--font-game);
  font-size: clamp(12px, 1.8vw, 16px);
  color: #fff8e0;
  line-height: 1.8;
}
.step { color: #ff9040; }

.btn {
  background: var(--bg-dark);
  border: 3px solid var(--panel-border-dark);
  outline: 2px solid var(--panel-border-light);
  outline-offset: -4px;
  box-shadow: 2px 3px 0 2px rgba(0,0,0,0.4);
  padding: 6px 16px;
  font-family: var(--font-game);
  font-size: 16px;
  color: #fff8e0;
  cursor: pointer;
  letter-spacing: 1px;
  transition: transform 0.1s, box-shadow 0.1s;
}
.btn:hover { filter: brightness(1.15); }
.btn:active { transform: translate(2px,3px); box-shadow: none; }

.main-panel {
  width: 100%;
  max-width: 1050px;
  background: var(--panel-bg);
  border: 3px solid var(--panel-border-dark);
  outline: 3px solid var(--panel-border-light);
  outline-offset: -6px;
  box-shadow: 0 0 0 6px var(--panel-border-mid), 4px 6px 0 6px rgba(0,0,0,0.4);
  padding: 18px;
  margin-bottom: 22vh;
}

.name-row { margin-bottom: 14px; }

.section-label {
  font-family: var(--font-game);
  font-size: 15px;
  color: var(--text-mid);
  letter-spacing: 1px;
  text-transform: uppercase;
  margin-bottom: 5px;
}

.name-input {
  width: 100%;
  max-width: 400px;
  background: #e8e0c8;
  border: 2px solid #8a7a5a;
  border-right-color: #5a4a2a;
  border-bottom-color: #5a4a2a;
  border-left-color: #c8b88a;
  border-top-color: #c8b88a;
  padding: 6px 10px;
  font-family: var(--font-game);
  font-size: 20px;
  color: var(--text-dark);
  outline: none;
}
.name-input::placeholder { color: rgba(90,74,42,0.35); }

.two-col {
  display: grid;
  grid-template-columns: 1fr 300px;
  gap: 16px;
}
@media(max-width: 700px) {
  .two-col { grid-template-columns: 1fr; }
  .mirror-col { order: -1; }
}

.selector-side { display: flex; flex-direction: column; gap: 10px; }

.category-section {
  background: #e8e0c8;
  border: 2px solid #8a7a5a;
  border-right-color: #5a4a2a;
  border-bottom-color: #5a4a2a;
  border-left-color: #c8b88a;
  border-top-color: #c8b88a;
  padding: 10px 12px;
}

.category-title {
  font-family: var(--font-game);
  font-size: 17px;
  color: var(--text-dark);
  letter-spacing: 1px;
  text-transform: uppercase;
  margin-bottom: 8px;
}

.parts-grid {
  display: flex;
  flex-wrap: wrap;
  gap: 6px;
}

.part-btn {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 3px;
  padding: 5px 7px;
  background: var(--panel-bg);
  border: 2px solid #8a7a5a;
  border-right-color: #5a4a2a;
  border-bottom-color: #5a4a2a;
  border-left-color: #c8b88a;
  border-top-color: #c8b88a;
  cursor: pointer;
  transition: filter 0.1s;
  min-width: 64px;
}
.part-btn:hover { filter: brightness(0.94); }
.part-btn.active {
  border-color: var(--accent) !important;
  outline: 2px solid var(--accent);
  outline-offset: 1px;
  background: #fff0e0;
}
.part-btn img {
  width: 52px;
  height: 44px;
  object-fit: contain;
  pointer-events: none;
}
.part-btn .part-name {
  font-family: var(--font-game);
  font-size: 11px;
  color: var(--text-dark);
  text-align: center;
  pointer-events: none;
  text-transform: uppercase;
}
.part-btn.none-btn img { opacity: 0.3; }

/* MIRROR */
.mirror-col { display: flex; flex-direction: column; gap: 10px; }

.mirror-frame {
  background: var(--mirror-bg);
  border: 5px solid #3a2a5a;
  border-radius: 50% 50% 48% 48% / 60% 60% 40% 40%;
  box-shadow:
    0 0 0 6px #6a4a9a,
    0 0 0 10px #3a2a5a,
    4px 8px 24px rgba(0,0,0,0.5);
  aspect-ratio: 0.72;
  position: relative;
  overflow: hidden;
  width: 100%;
}

/* Layered character display */
.char-layer {
  position: absolute;
  width: 100%;
  height: 100%;
  top: 0; left: 0;
  pointer-events: none;
}

/* Full-canvas exports: all layers are 777×1155px with parts in correct position.
   Stack them at 100% width/height — pixel-perfect, no manual offsets needed. */

.char-layer img {
  position: absolute;
  width: 100%;
  height: 100%;
  top: 0;
  left: 0;
  object-fit: fill;
}

.mirror-empty {
  position: absolute;
  inset: 0;
  display: flex;
  align-items: center;
  justify-content: center;
  pointer-events: none;
}
.mirror-empty-text {
  font-family: var(--font-game);
  font-size: 16px;
  color: rgba(100,80,40,0.3);
  text-align: center;
  line-height: 2;
  letter-spacing: 1px;
  text-transform: uppercase;
}

.char-name-display {
  font-family: var(--font-game);
  font-size: 22px;
  color: var(--text-dark);
  text-align: center;
  letter-spacing: 2px;
  text-transform: uppercase;
  min-height: 28px;
}

.summary-box {
  background: #e8e0c8;
  border: 2px solid #8a7a5a;
  border-right-color: #5a4a2a;
  border-bottom-color: #5a4a2a;
  border-left-color: #c8b88a;
  border-top-color: #c8b88a;
  padding: 8px 12px;
  font-family: var(--font-game);
  font-size: 13px;
  color: var(--text-mid);
  line-height: 1.8;
}
.summary-box span { color: var(--text-dark); }

/* ── GAME ROOM OVERLAY ─────────────────────────────────────────── */
@font-face {
  font-family: "ZoesHandwriting";
  src: url("assets/fonts/ZoesHandwriting-Regular.ttf") format("truetype");
}
body, .wall { background: #f5f0ea; }

.gr-floor {
  position: fixed; bottom: 0; left: 0;
  width: 100%; height: 10vh;
  z-index: 1; pointer-events: none;
}
.gr-floor img {
  width: 100%; height: 100%;
  object-fit: cover; object-position: top center;
  display: block;
}
.gr-baseboard {
  position: fixed; bottom: 10vh; left: 0;
  width: 100%; height: 16px;
  z-index: 3; pointer-events: none;
  background: #cdc8bd;
  box-shadow: 0 -3px 0 0 #c7c2b7, 0 4px 0 0 #b8b3a8, 0 7px 5px rgba(0,0,0,0.15);
}
.gr-heart {
  position: fixed; left: 30px; bottom: calc(10vh - 35px);
  width: clamp(100px, 13vw, 190px);
  display: flex; align-items: flex-end;
  cursor: default; z-index: 5;
}
.gr-heart img {
  display: block; width: 100%; height: auto;
  filter: drop-shadow(0 4px 10px rgba(0,0,0,0.28));
  animation:
    gr-intro-wiggle 0.85s ease-out 0.35s 1 backwards,
    gr-idle-pulse   3.6s ease-in-out 1.5s infinite;
}
.gr-bubble {
  position: absolute;
  background: rgba(255,255,255,0.96);
  border-radius: 20px; padding: 14px 22px;
  font-family: "ZoesHandwriting", cursive;
  font-size: clamp(14px, 1.6vw, 20px);
  color: #5a3a7a; text-align: center; line-height: 1.4;
  filter: drop-shadow(2px 4px 8px rgba(0,0,0,0.18));
  z-index: 6; white-space: nowrap;
  left: calc(100% + 20px); bottom: 30%;
  pointer-events: none;
}
.gr-bubble::after {
  content: ''; position: absolute;
  top: 50%; left: -8px; transform: translateY(-50%);
  width: 8px; height: 8px; border-radius: 50%;
  background: rgba(255,255,255,0.96);
  box-shadow:
    -14px 0 0 -2px rgba(255,255,255,0.96),
    -24px 0 0 -4px rgba(255,255,255,0.96);
}
@keyframes gr-intro-wiggle {
  0%   { transform: rotate(0deg) scale(1); }
  18%  { transform: rotate(-11deg) scale(1.06); }
  38%  { transform: rotate(11deg) scale(1.06); }
  58%  { transform: rotate(-6deg) scale(1.02); }
  78%  { transform: rotate(6deg) scale(1.02); }
  100% { transform: rotate(0deg) scale(1); }
}
@keyframes gr-idle-pulse {
  0%,100% { transform: translateY(0)    rotate(-2deg) scale(1); }
  50%      { transform: translateY(-8px) rotate(2deg)  scale(1.03); }
}
</style>
</head>

  </div>

</div>

  { id:"acc_angel",        label:"Angel" },
  { id:"acc_birthday",     label:"Birthday" },
  { id:"acc_swearword",    label:"Sensor" },
  { id:"acc_rainstorm",    label:"Rainstorm" },
  { id:"acc_rainbow",      label:"Rainbow" },
];

let state = { name:"", body:null, hair:null, eyes:null, mouth:null, acc:null };

function save() {
  try { localStorage.setItem("hb-char", JSON.stringify(state)); } catch(e){}
}
function load() {
  try { const s = localStorage.getItem("hb-char"); if(s) state = JSON.parse(s); } catch(e){}
}

function renderLayer(layerId, partId) {
  const layer = document.getElementById(layerId);
  layer.innerHTML = partId ? `<img src="${FULL_ASSETS[partId]}" alt="" />` : "";
}

function render() {
  document.getElementById("mirrorEmpty").style.display = state.body ? "none" : "flex";
  renderLayer("layerBody",  state.body);
  renderLayer("layerHair",  state.hair);
  renderLayer("layerEyes",  state.eyes);
  renderLayer("layerMouth", state.mouth);
  renderLayer("layerAcc",   state.acc);

  // summary
  const find = (arr, id) => arr.find(x => x.id === id);
  const parts = [
    state.body  ? `body: <span>${find(BODIES,state.body)?.label}</span>` : null,
    state.hair  ? `hair: <span>${find(HAIRS,state.hair)?.label}</span>` : null,
    state.eyes  ? `eyes: <span>${find(EYES,state.eyes)?.label}</span>` : null,
    state.mouth ? `mouth: <span>${find(MOUTHS,state.mouth)?.label}</span>` : null,
    state.acc   ? `accessory: <span>${find(ACCS,state.acc)?.label}</span>` : null,
  ].filter(Boolean);
  document.getElementById("summaryBox").innerHTML = parts.length ? parts.join(" · ") : "nothing selected yet";
  document.getElementById("charNameDisplay").textContent = state.name ? state.name.toUpperCase() : "";

  // active states
  document.querySelectorAll(".part-btn").forEach(b => b.classList.remove("active"));
  ["body","hair","eyes","mouth","acc"].forEach(key => {
    if(state[key]) document.querySelector(`[data-id="${state[key]}"]`)?.classList.add("active");
  });
}

function makeGrid(containerId, items, stateKey, allowNone) {
  const container = document.getElementById(containerId);
  if(allowNone) {
    const btn = document.createElement("div");
    btn.className = "part-btn none-btn";
    btn.innerHTML = `<img src="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 52 44'%3E%3Cline x1='4' y1='4' x2='48' y2='40' stroke='%23aaa' stroke-width='3'/%3E%3Cline x1='48' y1='4' x2='4' y2='40' stroke='%23aaa' stroke-width='3'/%3E%3C/svg%3E" alt="none"/><div class="part-name">none</div>`;
    btn.addEventListener("click", () => { state[stateKey] = null; save(); render(); });
    container.appendChild(btn);
  }
  items.forEach(item => {
    const btn = document.createElement("div");
    btn.className = "part-btn";
    btn.dataset.id = item.id;
    btn.innerHTML = `<img src="${ASSETS[item.id]}" alt="${item.label}" /><div class="part-name">${item.label}</div>`;
    btn.addEventListener("click", () => {
      state[stateKey] = state[stateKey] === item.id ? null : item.id;
      save(); render();
    });
    container.appendChild(btn);
  });
}

function onNameChange() {
  state.name = document.getElementById("charName").value;
  save(); render();
}

function resetCharacter() {
  state = { name:"", body:null, hair:null, eyes:null, mouth:null, acc:null };
  document.getElementById("charName").value = "";
  save(); render();
}

load();
makeGrid("grid-body",  BODIES, "body",  false);
makeGrid("grid-hair",  HAIRS,  "hair",  false);
makeGrid("grid-eyes",  EYES,   "eyes",  false);
makeGrid("grid-mouth", MOUTHS, "mouth", false);
makeGrid("grid-acc",   ACCS,   "acc",   false);
document.getElementById("charName").value = state.name || "";
render();
</script>
