<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Heartability</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=VT323&display=swap" rel="stylesheet">
<style>

@font-face {
  font-family: "ZoesHandwriting";
  src: url("assets/ZoesHandwriting-Regular.ttf") format("truetype");
}

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  min-height: 100vh;
  background: #6578e2;
  font-family: "ZoesHandwriting", cursive;
  overflow: hidden;
  position: relative;
  user-select: none;
}

/* ── STARFIELD ───────────────────────────────────── */

#stars {
  position: fixed;
  inset: 0;
  pointer-events: none;
  z-index: 0;
}

.star {
  position: absolute;
  background: #fff;
  clip-path: polygon(50% 0%, 54% 43%, 100% 50%, 54% 57%, 50% 100%, 46% 57%, 0% 50%, 46% 43%);
  animation: twinkle var(--d, 2s) ease-in-out infinite var(--del, 0s);
}

@keyframes twinkle {
  0%,  100% { opacity: 0.9;  transform: scale(1)   rotate(0deg); }
  50%        { opacity: 0.05; transform: scale(0.2) rotate(45deg); }
}

/* ── RAINBOW ─────────────────────────────────────── */

.rainbow-bg {
  position: fixed;
  left: 150px;
  top: 300px;
  transform: rotate(-33deg);
  width: clamp(480px, 65vw, 760px);
  pointer-events: none;
  z-index: 0;
  animation: rainbowShimmer 4s ease-in-out infinite;
}

@keyframes rainbowShimmer {
  0%,  100% { opacity: 0.8; }
  50%        { opacity: 1; }
}

/* ── TITLE SCREEN ────────────────────────────────── */

.title-screen {
  position: relative;
  z-index: 1;
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 20px 16px 120px;
  gap: 0;
  /* Shift content slightly upward so rainbow feels connected */
  margin-top: -6vh;
}

/* ── GAME TITLE ──────────────────────────────────── */

.game-title {
  font-family: "ZoesHandwriting", cursive;
  font-size: clamp(50px, 10vw, 120px);
  color: #83d2e6;
  text-shadow:
    3px 3px 0 #2a8098,
    6px 7px 0 rgba(0,0,0,0.55);
  line-height: 0.92;
  letter-spacing: -1px;
  text-align: center;
  margin-bottom: 44px;
}

/* ── ENTER BUTTON ────────────────────────────────── */

.enter-btn {
  display: inline-block;
  font-family: "ZoesHandwriting", cursive;
  font-size: clamp(42px, 6vw, 68px);
  color: rgba(255, 255, 255, 0.9);
  text-decoration: none;
  text-shadow: 2px 3px 0 rgba(0,0,0,0.3);
  cursor: pointer;
  animation: softBlink 1.4s ease-in-out infinite;
  transition: color 0.15s, text-shadow 0.15s;
}

.enter-btn:hover {
  color: #fff;
  text-shadow: 2px 3px 0 rgba(0,0,0,0.4), 0 0 24px rgba(255,255,255,0.55);
  animation: none;
}

@keyframes softBlink {
  0%,  42% { opacity: 1; }
  50%, 92%  { opacity: 0.45; }
  100%      { opacity: 1; }
}

/* ── CHARACTER AREA ──────────────────────────────── */

.character-area {
  position: fixed;
  bottom: 500px;
  right: 350px;
  display: flex;
  align-items: center;
  gap: 10px;
  z-index: 2;
}

/* ── THOUGHT BUBBLE ──────────────────────────────── */

.thought-bubble-link {
  display: block;
  text-decoration: none;
  cursor: pointer;
}

.thought-bubble {
  background: rgba(255, 255, 255, 0.93);
  border-radius: 22px;
  padding: 13px 20px;
  font-family: "ZoesHandwriting", cursive;
  font-size: clamp(16px, 1.9vw, 22px);
  color: #5a3a7a;
  text-align: center;
  line-height: 1.35;
  position: relative;
  filter: drop-shadow(2px 4px 8px rgba(0,0,0,0.22));
  transition: filter 0.15s, transform 0.15s;
  max-width: 180px;
}

/* Three bubble-dot tail pointing right toward the character */
.thought-bubble::after {
  content: '';
  position: absolute;
  top: 50%;
  right: -14px;
  transform: translateY(-50%);
  width: 11px;
  height: 11px;
  border-radius: 50%;
  background: rgba(255, 255, 255, 0.93);
  box-shadow:
    16px 4px 0 -2px rgba(255, 255, 255, 0.93),
    28px 10px 0 -4px rgba(255, 255, 255, 0.93);
}

.thought-bubble-link:hover .thought-bubble {
  filter: drop-shadow(2px 6px 14px rgba(0,0,0,0.32));
  transform: scale(1.04);
}

/* ── HEART CHARACTER ─────────────────────────────── */

.heart-link {
  display: block;
  text-decoration: none;
  cursor: pointer;
}

.heart-float {
  width: clamp(110px, 15vw, 180px);
  height: auto;
  filter: drop-shadow(0 6px 14px rgba(0,0,0,0.5));
  display: block;
  /* intro wiggle plays once on load, then smooth idle pulse begins */
  animation:
    intro-wiggle 0.85s ease-out 0.35s 1 backwards,
    idle-pulse 3.6s ease-in-out 1.5s infinite;
}

.heart-link:hover .heart-float {
  animation: hover-bounce 0.55s ease-in-out infinite;
}

@keyframes intro-wiggle {
  0%   { transform: rotate(0deg) scale(1); }
  18%  { transform: rotate(-11deg) scale(1.06); }
  38%  { transform: rotate(11deg) scale(1.06); }
  58%  { transform: rotate(-6deg) scale(1.02); }
  78%  { transform: rotate(6deg) scale(1.02); }
  100% { transform: rotate(0deg) scale(1); }
}

@keyframes idle-pulse {
  0%,  100% { transform: translateY(0)     rotate(-2deg) scale(1); }
  50%        { transform: translateY(-10px) rotate(2deg)  scale(1.03); }
}

@keyframes hover-bounce {
  0%,  100% { transform: translateY(0)     rotate(-3deg) scale(1.07); }
  50%        { transform: translateY(-16px) rotate(3deg)  scale(1.11); }
}

/* ── COPYRIGHT ───────────────────────────────────── */

.copyright {
  position: fixed;
  bottom: 14px;
  left: 20px;
  font-size: 15px;
  color: rgba(255,255,255,0.32);
  letter-spacing: 1px;
  z-index: 5;
  font-family: "ZoesHandwriting", cursive;
}

.copyright a {
  color: inherit;
  text-decoration: none;
}

.copyright a:hover { color: rgba(255,255,255,0.72); }

</style>
</head>
<body>

<div id="stars"></div>

<img class="rainbow-bg" src="assets/rainbow.png" alt="" aria-hidden="true">

<div class="title-screen">
  <h1 class="game-title">HEARTABILITY</h1>
  <a class="enter-btn" href="game-select.html">enter</a>
</div>

<div class="character-area">
  <a class="thought-bubble-link" href="about.html" aria-label="Learn how to play">
    <div class="thought-bubble">
      I can teach you<br>how to play!
    </div>
  </a>
  <a class="heart-link" href="about.html" aria-label="Heart character — learn how to play">
    <img class="heart-float"
         src="assets/guides/01%20TG%20MAIN%20HEART.png"
         alt="Heart mascot character">
  </a>
</div>

<p class="copyright">©&nbsp;<a href="https://untolduntilmedia.com" target="_blank" rel="noopener">untold until media</a></p>

<script>
(function () {

  /* ── Starfield ────────────────────────────────── */
  const field = document.getElementById('stars');
  for (let i = 0; i < 90; i++) {
    const s = document.createElement('div');
    s.className = 'star';
    const sz = (Math.random() * 5 + 2).toFixed(1);
    s.style.cssText = [
      `width:${sz}px`, `height:${sz}px`,
      `left:${(Math.random() * 100).toFixed(1)}%`,
      `top:${(Math.random() * 100).toFixed(1)}%`,
      `--d:${(1.4 + Math.random() * 3.2).toFixed(2)}s`,
      `--del:${(-Math.random() * 4).toFixed(2)}s`
    ].join(';');
    field.appendChild(s);
  }

})();
</script>
</body>
</html>
