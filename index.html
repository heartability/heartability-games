<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Heartability</title>
<style>

@font-face {
  font-family: "ZoesHandwriting";
  src: url("assets/fonts/ZoesHandwriting-Regular.ttf") format("truetype");
}

@font-face {
  font-family: "PFPixelScript";
  src: url("assets/fonts/PFPixelscriptProRegular.ttf") format("truetype");
}

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  min-height: 100vh;
  height: 100vh;
  background: #6578e2;
  font-family: "ZoesHandwriting", cursive;
  overflow: hidden;
  position: relative;
  user-select: none;
}

/* ── STARFIELD ───────────────────────────────────── */

#stars {
  position: fixed;
  inset: 0;
  pointer-events: none;
  z-index: 0;
}

.star {
  position: absolute;
  background: #fff;
  clip-path: polygon(50% 0%, 54% 43%, 100% 50%, 54% 57%, 50% 100%, 46% 57%, 0% 50%, 46% 43%);
  animation: twinkle var(--d, 2s) ease-in-out infinite var(--del, 0s);
}

@keyframes twinkle {
  0%,  100% { opacity: 0.9;  transform: scale(1)   rotate(0deg); }
  50%        { opacity: 0.05; transform: scale(0.2) rotate(45deg); }
}

/* ── SCENE ───────────────────────────────────────── */

.scene {
  position: relative;
  width: 100vw;
  height: 100vh;
  z-index: 1;
}

/* ── TITLE TEXT IMAGES ───────────────────────────── */

.title-heart {
  position: absolute;
  top: clamp(4px, 8vh, 40px);
  left: clamp(10px, 2vw, 40px);
  width: clamp(200px, 28vw, 400px);
  height: auto;
  z-index: 4;
  pointer-events: none;
}

.title-ability {
  position: absolute;
  bottom: clamp(20px, 8vh, 60px);
  right: clamp(10px, 2vw, 40px);
  width: clamp(200px, 28vw, 400px);
  height: auto;
  z-index: 4;
  pointer-events: none;
}

/* ── PORTAL ANCHOR ───────────────────────────────────
   Single centered container. All portal elements are
   positioned absolutely within it, sharing one center.
   z-order (back→front): castle(2) → rainbow(3) → cloud(4) → enter(5)
─────────────────────────────────────────────────── */

.portal-anchor {
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  width: clamp(520px, 72vw, 900px);
  /* height:0 so the anchor doesn't affect flow; children self-size */
  height: 0;
  z-index: 2;
}

/* ── RAINBOW — z3, covers castle bottom edge ──────── */

.rainbow-portal {
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  width: 100%;
  height: auto;
  pointer-events: none;
  z-index: 3;
  display: block;
}

/* ── CASTLE — z2, behind rainbow ─────────────────── */

.castle-link {
  position: absolute;
  top: 50%;
  left: 50%;
  /* nudge down slightly so base sits on portal floor */
  transform: translate(-50%, -40%);
  display: block;
  cursor: pointer;
  text-decoration: none;
  z-index: 2;
}

.castle-img {
  width: clamp(150px, 20vw, 280px);
  height: auto;
  display: block;
  filter: drop-shadow(0 6px 16px rgba(0,0,0,0.35));
  animation: castlePulse 3s ease-in-out infinite;
  transition: filter 0.2s;
  transform-origin: center bottom;
}

.castle-link:hover .castle-img {
  filter: drop-shadow(0 8px 24px rgba(255,255,255,0.5)) drop-shadow(0 4px 12px rgba(0,0,0,0.4));
  animation: none;
}

@keyframes castlePulse {
  0%,  100% { transform: scale(1); }
  50%        { transform: scale(1.03); }
}

/* ── CLOUD — z4, above rainbow ────────────────────── */

.cloud-wrap {
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(2vw, -18vh);
  z-index: 4;
  pointer-events: none;
}

.cloud-img {
  width: clamp(60px, 7vw, 100px);
  height: auto;
  display: block;
  filter: drop-shadow(0 4px 10px rgba(0,0,0,0.3));
  animation: cloudFloat 4s ease-in-out infinite;
}

@keyframes cloudFloat {
  0%,  100% { transform: translateY(0px) rotate(-2deg); }
  50%        { transform: translateY(-10px) rotate(2deg); }
}

/* ── ENTER — z5, left of castle on desktop ─────────── */

.enter-btn {
  position: absolute;
  top: 50%;
  left: 50%;
  /* left of castle, vertically aligned with its mid-point */
  transform: translate(-155%, -80%);
  font-family: "ZoesHandwriting", cursive;
  font-size: clamp(24px, 3vw, 46px);
  color: rgba(255, 255, 255, 0.92);
  text-decoration: none;
  text-shadow: 2px 3px 0 rgba(0,0,0,0.28);
  cursor: pointer;
  z-index: 5;
  animation: softBlink 1.6s ease-in-out infinite;
  white-space: nowrap;
}

.enter-btn:hover {
  color: #fff;
  text-shadow: 2px 3px 0 rgba(0,0,0,0.4), 0 0 20px rgba(255,255,255,0.6);
  animation: none;
}

@keyframes softBlink {
  0%,  42% { opacity: 1; }
  50%, 92%  { opacity: 0.4; }
  100%      { opacity: 1; }
}

/* ── COPYRIGHT ───────────────────────────────────── */

.copyright {
  position: fixed;
  bottom: 14px;
  left: 20px;
  font-family: "PFPixelScript", monospace;
  font-size: 15px;
  color: rgba(255,255,255,0.32);
  letter-spacing: 1px;
  z-index: 10;
}

.copyright a {
  color: inherit;
  text-decoration: none;
}

.copyright a:hover { color: rgba(255,255,255,0.72); }

/* ── SCREEN READER ONLY ──────────────────────────── */

.sr-only {
  position: absolute;
  width: 1px;
  height: 1px;
  overflow: hidden;
  clip: rect(0,0,0,0);
  white-space: nowrap;
}

/* ══════════════════════════════════════════════════
   MOBILE
══════════════════════════════════════════════════ */

@media (max-width: 768px) {

  .title-heart {
    top: clamp(6px, 2vh, 24px);
    left: clamp(6px, 3vw, 20px);
    width: clamp(140px, 42vw, 240px);
  }

  .title-ability {
    bottom: clamp(30px, 6vh, 60px);
    right: clamp(6px, 3vw, 20px);
    width: clamp(140px, 42vw, 240px);
  }

  .portal-anchor {
    width: clamp(280px, 90vw, 460px);
  }

  .castle-img {
    width: clamp(90px, 28vw, 160px);
  }

  /* Mobile: enter centered below castle */
  .enter-btn {
    transform: translate(-50%, 50%);
    font-size: clamp(20px, 5vw, 32px);
  }

  /* Mobile: cloud higher, tighter to spire */
  .cloud-wrap {
    transform: translate(5vw, -25vw);
  }

  .cloud-img {
    width: clamp(40px, 11vw, 68px);
  }

}

</style>
</head>
<body>

<h1 class="sr-only">Heartability</h1>

<div id="stars"></div>

<div class="scene">

  <!-- "heart" text — top left -->
  <img class="title-heart"
       src="assets/elements/heart-text.png"
       alt=""
       aria-hidden="true">

  <!-- "ability" text — bottom right -->
  <img class="title-ability"
       src="assets/elements/ability-text.png"
       alt=""
       aria-hidden="true">

  <div class="portal-anchor">

    <!-- Castle — z2, BEHIND rainbow -->
    <a class="castle-link" href="game-select.html" aria-label="Enter Heartability">
      <img class="castle-img"
           src="assets/elements/castle.png"
           alt="Castle — click to enter">
    </a>

    <!-- Rainbow — z3, IN FRONT of castle -->
    <img class="rainbow-portal"
         id="rainbowPortal"
         src="assets/elements/circle-rainbow.png"
         alt=""
         aria-hidden="true">

    <!-- Cloud — z4, above rainbow -->
    <div class="cloud-wrap">
      <img class="cloud-img"
           src="assets/elements/guides/cloud.png"
           alt="">
    </div>

    <!-- Enter — z5, left of castle (desktop) / below (mobile) -->
    <a class="enter-btn" href="game-select.html">enter</a>

  </div>

</div>

<p class="copyright">©&nbsp;<a href="https://untolduntilmedia.com" target="_blank" rel="noopener">untold until media</a></p>

<script>
(function () {

  /* ── Starfield ────────────────────────────────── */
  const field = document.getElementById('stars');
  for (let i = 0; i < 90; i++) {
    const s = document.createElement('div');
    s.className = 'star';
    const sz = (Math.random() * 5 + 2).toFixed(1);
    s.style.cssText = [
      `width:${sz}px`, `height:${sz}px`,
      `left:${(Math.random() * 100).toFixed(1)}%`,
      `top:${(Math.random() * 100).toFixed(1)}%`,
      `--d:${(1.4 + Math.random() * 3.2).toFixed(2)}s`,
      `--del:${(-Math.random() * 4).toFixed(2)}s`
    ].join(';');
    field.appendChild(s);
  }

  /* ── Swap rainbow asset for mobile ───────────── */
  function swapRainbow() {
    const img = document.getElementById('rainbowPortal');
    if (!img) return;
    img.src = window.innerWidth <= 768
      ? 'assets/elements/circle-rainbow-m.png'
      : 'assets/elements/circle-rainbow.png';
  }

  swapRainbow();
  window.addEventListener('resize', swapRainbow);

})();
</script>
</body>
</html>
