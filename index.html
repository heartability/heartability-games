<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Heartability</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=VT323&display=swap" rel="stylesheet">
<style>

@font-face {
  font-family: "ZoesHandwriting";
  src: url("assets/fonts/ZoesHandwriting-Regular.ttf") format("truetype");
}

@font-face {
  font-family: "PixelScript";
  src: url("assets/fonts/PixelScript.ttf") format("truetype");
}

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  min-height: 100vh;
  height: 100vh;
  background: #6578e2;
  font-family: "ZoesHandwriting", cursive;
  overflow: hidden;
  position: relative;
  user-select: none;
}

/* ── STARFIELD ───────────────────────────────────── */

#stars {
  position: fixed;
  inset: 0;
  pointer-events: none;
  z-index: 0;
}

.star {
  position: absolute;
  background: #fff;
  clip-path: polygon(50% 0%, 54% 43%, 100% 50%, 54% 57%, 50% 100%, 46% 57%, 0% 50%, 46% 43%);
  animation: twinkle var(--d, 2s) ease-in-out infinite var(--del, 0s);
}

@keyframes twinkle {
  0%,  100% { opacity: 0.9;  transform: scale(1)   rotate(0deg); }
  50%        { opacity: 0.05; transform: scale(0.2) rotate(45deg); }
}

/* ── LAYOUT ──────────────────────────────────────── */

.scene {
  position: relative;
  width: 100vw;
  height: 100vh;
  z-index: 1;
}

/* ── RAINBOW (desktop oval) ──────────────────────── */

.rainbow-portal {
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  width: clamp(520px, 72vw, 900px);
  height: auto;
  pointer-events: none;
  z-index: 1;
}

/* ── TITLE TEXT IMAGES ───────────────────────────── */

/* "heart" — top left, outside rainbow */
.title-heart {
  position: absolute;
  top: clamp(4px, 4vh, 48px);
  left: clamp(10px, 3vw, 60px);
  width: clamp(180px, 26vw, 380px);
  height: auto;
  z-index: 2;
  pointer-events: none;
}

/* "ability" — bottom right, outside rainbow */
.title-ability {
  position: absolute;
  bottom: clamp(20px, 5vh, 70px);
  right: clamp(10px, 2vw, 50px);
  width: clamp(180px, 26vw, 380px);
  height: auto;
  z-index: 2;
  pointer-events: none;
}

/* ── PORTAL INTERIOR ─────────────────────────────── */

/* Wrapper sits centered over the rainbow hole */
.portal-interior {
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -48%);
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 0;
  z-index: 3;
}

/* ── CASTLE ──────────────────────────────────────── */

.castle-link {
  display: block;
  cursor: pointer;
  text-decoration: none;
  position: relative;
}

.castle-img {
  width: clamp(160px, 22vw, 300px);
  height: auto;
  display: block;
  filter: drop-shadow(0 6px 16px rgba(0,0,0,0.35));
  animation: castlePulse 3s ease-in-out infinite;
  transition: filter 0.2s, transform 0.2s;
}

.castle-link:hover .castle-img {
  filter: drop-shadow(0 8px 24px rgba(255,255,255,0.5)) drop-shadow(0 4px 12px rgba(0,0,0,0.4));
  animation: none;
  transform: scale(1.04);
}

@keyframes castlePulse {
  0%,  100% { transform: scale(1); }
  50%        { transform: scale(1.03); }
}

/* ── ENTER BUTTON ────────────────────────────────── */

.enter-btn {
  font-family: "ZoesHandwriting", cursive;
  font-size: clamp(28px, 3.5vw, 52px);
  color: rgba(255, 255, 255, 0.92);
  text-decoration: none;
  text-shadow: 2px 3px 0 rgba(0,0,0,0.28);
  cursor: pointer;
  display: block;
  margin-top: 6px;
  animation: softBlink 1.6s ease-in-out infinite;
  transition: color 0.15s, text-shadow 0.15s;
  text-align: center;
}

.enter-btn:hover {
  color: #fff;
  text-shadow: 2px 3px 0 rgba(0,0,0,0.4), 0 0 20px rgba(255,255,255,0.6);
  animation: none;
}

@keyframes softBlink {
  0%,  42% { opacity: 1; }
  50%, 92%  { opacity: 0.4; }
  100%      { opacity: 1; }
}

/* ── CLOUD CHARACTER ─────────────────────────────── */

.cloud-wrap {
  position: absolute;
  top: 50%;
  left: 50%;
  /* offset right of castle spire — adjust to taste */
  transform: translate(4vw, -14vh);
  z-index: 4;
  pointer-events: none;
}

.cloud-img {
  width: clamp(60px, 8vw, 110px);
  height: auto;
  display: block;
  filter: drop-shadow(0 4px 10px rgba(0,0,0,0.3));
  animation:
    cloudFloat 4s ease-in-out infinite,
    cloudDrift 9s ease-in-out infinite;
}

@keyframes cloudFloat {
  0%,  100% { transform: translateY(0px) rotate(-2deg); }
  50%        { transform: translateY(-12px) rotate(2deg); }
}

@keyframes cloudDrift {
  0%,  100% { transform: translateX(0px); }
  50%        { transform: translateX(8px); }
}

/* ── COPYRIGHT ───────────────────────────────────── */

.copyright {
  position: fixed;
  bottom: 14px;
  left: 20px;
  font-family: "VT323", "PixelScript", monospace;
  font-size: 15px;
  color: rgba(255,255,255,0.32);
  letter-spacing: 1px;
  z-index: 5;
}

.copyright a {
  color: inherit;
  text-decoration: none;
}

.copyright a:hover { color: rgba(255,255,255,0.72); }

/* ── SCREEN READER ONLY ──────────────────────────── */

.sr-only {
  position: absolute;
  width: 1px;
  height: 1px;
  overflow: hidden;
  clip: rect(0,0,0,0);
  white-space: nowrap;
}

/* ══════════════════════════════════════════════════
   MOBILE  (portrait, circle rainbow)
══════════════════════════════════════════════════ */

@media (max-width: 768px) {

  .rainbow-portal {
    width: clamp(280px, 88vw, 480px);
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
  }

  /* On mobile swap to circle rainbow via CSS background swap trick —
     the src is switched via JS below */

  .title-heart {
    top: clamp(6px, 3vh, 30px);
    left: clamp(6px, 3vw, 24px);
    width: clamp(130px, 38vw, 220px);
  }

  .title-ability {
    bottom: clamp(30px, 7vh, 60px);
    right: clamp(6px, 3vw, 24px);
    width: clamp(130px, 38vw, 220px);
  }

  .portal-interior {
    transform: translate(-50%, -50%);
  }

  .castle-img {
    width: clamp(100px, 34vw, 180px);
  }

  .enter-btn {
    font-size: clamp(22px, 5.5vw, 36px);
  }

  .cloud-wrap {
    transform: translate(6vw, -16vw);
  }

  .cloud-img {
    width: clamp(44px, 12vw, 72px);
  }

}

</style>
</head>
<body>

<!-- Screen reader title for accessibility + SEO -->
<h1 class="sr-only">Heartability</h1>

<div id="stars"></div>

<div class="scene">

  <!-- Rainbow portal image (swapped desktop/mobile via JS) -->
  <img class="rainbow-portal"
       id="rainbowPortal"
       src="assets/elements/circle-rainbow.png"
       alt=""
       aria-hidden="true">

  <!-- "heart" text asset — top left -->
  <img class="title-heart"
       src="assets/elements/heart-text.png"
       alt=""
       aria-hidden="true">

  <!-- "ability" text asset — bottom right -->
  <img class="title-ability"
       src="assets/elements/ability-text.png"
       alt=""
       aria-hidden="true">

  <!-- Cloud character — floats near castle spire -->
  <div class="cloud-wrap">
    <img class="cloud-img"
         src="assets/elements/guides/cloud.png"
         alt="">
  </div>

  <!-- Castle + enter — centered inside portal -->
  <div class="portal-interior">
    <a class="castle-link" href="game-select.html" aria-label="Enter Heartability">
      <img class="castle-img"
           src="assets/elements/castle.png"
           alt="Castle — click to enter">
    </a>
    <a class="enter-btn" href="game-select.html">enter</a>
  </div>

</div>

<p class="copyright">©&nbsp;<a href="https://untolduntilmedia.com" target="_blank" rel="noopener">untold until media</a></p>

<script>
(function () {

  /* ── Starfield ────────────────────────────────── */
  const field = document.getElementById('stars');
  for (let i = 0; i < 90; i++) {
    const s = document.createElement('div');
    s.className = 'star';
    const sz = (Math.random() * 5 + 2).toFixed(1);
    s.style.cssText = [
      `width:${sz}px`, `height:${sz}px`,
      `left:${(Math.random() * 100).toFixed(1)}%`,
      `top:${(Math.random() * 100).toFixed(1)}%`,
      `--d:${(1.4 + Math.random() * 3.2).toFixed(2)}s`,
      `--del:${(-Math.random() * 4).toFixed(2)}s`
    ].join(';');
    field.appendChild(s);
  }

  /* ── Swap rainbow asset for mobile ───────────── */
  function swapRainbow() {
    const img = document.getElementById('rainbowPortal');
    if (!img) return;
    if (window.innerWidth <= 768) {
      img.src = 'assets/elements/circle-rainbow-m.png';
    } else {
      img.src = 'assets/elements/circle-rainbow.png';
    }
  }

  swapRainbow();
  window.addEventListener('resize', swapRainbow);

})();
</script>
</body>
</html>
