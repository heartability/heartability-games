<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Heartability</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=VT323&display=swap" rel="stylesheet">
<style>

@font-face {
  font-family: "ZoesHandwriting";
  src: url("assets/ZoesHandwriting-Regular.ttf") format("truetype");
}

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  min-height: 100vh;
  background: #6578e2;
  font-family: "VT323", monospace;
  overflow: hidden;
  position: relative;
  user-select: none;
  cursor: pointer;
}

/* ── STARFIELD ───────────────────────────────────── */

#stars {
  position: fixed;
  inset: 0;
  pointer-events: none;
  z-index: 0;
}

.star {
  position: absolute;
  /* 4-pointed star shape */
  background: #fff;
  clip-path: polygon(50% 0%, 54% 43%, 100% 50%, 54% 57%, 50% 100%, 46% 57%, 0% 50%, 46% 43%);
  animation: twinkle var(--d, 2s) ease-in-out infinite var(--del, 0s);
}

@keyframes twinkle {
  0%,  100% { opacity: 0.9;  transform: scale(1)   rotate(0deg); }
  50%        { opacity: 0.05; transform: scale(0.2) rotate(45deg); }
}

/* ── LAYOUT ──────────────────────────────────────── */

.title-screen {
  position: relative;
  z-index: 1;
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 20px 16px 60px;
  gap: 0;
}

/* ── HERO TITLE ROW ──────────────────────────────── */

.hero {
  display: flex;
  flex-direction: row;
  align-items: flex-end;
  gap: clamp(12px, 2.5vw, 28px);
  margin-bottom: 12px;
}

.heart-float {
  width: clamp(88px, 13vw, 155px);
  height: auto;
  animation: bob 3.2s ease-in-out infinite;
  filter: drop-shadow(0 6px 14px rgba(0,0,0,0.5));
  flex-shrink: 0;
}

@keyframes bob {
  0%,  100% { transform: translateY(0)    rotate(-3deg); }
  50%        { transform: translateY(-18px) rotate(2deg); }
}

.game-title {
  font-family: "ZoesHandwriting", cursive;
  font-size: clamp(50px, 10vw, 120px);
  color: #83d2e6;
  text-shadow:
    3px 3px 0 #2a8098,
    6px 7px 0 rgba(0,0,0,0.55);
  line-height: 0.92;
  letter-spacing: -1px;
}

/* ── TAGLINE ─────────────────────────────────────── */

.tagline {
  font-size: clamp(12px, 2vw, 19px);
  color: rgba(255, 235, 200, 0.68);
  letter-spacing: 3px;
  text-transform: uppercase;
  text-align: center;
  margin-bottom: 52px;
}

/* ── PRESS START ─────────────────────────────────── */

.press-start {
  font-size: clamp(17px, 2.8vw, 26px);
  color: #fdf6e3;
  letter-spacing: 5px;
  text-transform: uppercase;
  animation: blink 1.1s step-end infinite;
  margin-bottom: 8px;
}

@keyframes blink {
  0%,  49% { opacity: 1; }
  50%, 100% { opacity: 0; }
}

/* ── CHOICE MENU ─────────────────────────────────── */

.menu {
  display: none;
  flex-direction: column;
  align-items: center;
  gap: 18px;
}

.menu.open {
  display: flex;
  animation: rise 0.28s cubic-bezier(.2,.8,.4,1) both;
}

@keyframes rise {
  from { opacity: 0; transform: translateY(16px) scale(0.91); }
  to   { opacity: 1; transform: translateY(0)    scale(1);    }
}

/* ── RPG BUTTONS ─────────────────────────────────── */

.rpg-btn {
  display: block;
  min-width: 240px;
  padding: 10px 44px;
  text-align: center;
  text-decoration: none;
  font-family: "VT323", monospace;
  font-size: clamp(22px, 3.6vw, 32px);
  letter-spacing: 5px;
  text-transform: uppercase;
  color: #fdf6e3;
  background: rgba(0,0,0,0.45);
  border: 3px solid #f5c842;
  outline: 2px solid #c8841a;
  outline-offset: -5px;
  box-shadow: 3px 5px 0 0 rgba(0,0,0,0.55);
  transition: background 0.12s, transform 0.08s, box-shadow 0.08s;
  cursor: pointer;
  position: relative;
  z-index: 2;
}

.rpg-btn:hover {
  background: rgba(245,200,66,0.2);
  transform: translate(-1px,-2px);
  box-shadow: 5px 7px 0 0 rgba(0,0,0,0.55);
}

.rpg-btn:active {
  transform: translate(2px, 4px);
  box-shadow: none;
}

.rpg-btn.about-btn {
  border-color: #f07ab8;
  outline-color: #b84080;
}

.rpg-btn.about-btn:hover { background: rgba(240,122,184,0.2); }

/* ── RAINBOW ─────────────────────────────────────── */

.rainbow-bg {
  position: fixed;
  right: -100px;
  top: 60px;
  width: clamp(300px, 40vw, 480px);
  transform: rotate(-28deg);
  transform-origin: top right;
  pointer-events: none;
  z-index: 1;
  /* Gradient mask: only a traveling window is ever visible */
  -webkit-mask-image: linear-gradient(
    90deg,
    transparent 0%,
    rgba(255,255,255,0.85) 30%,
    rgba(255,255,255,0.85) 70%,
    transparent 100%
  );
  mask-image: linear-gradient(
    90deg,
    transparent 0%,
    rgba(255,255,255,0.85) 30%,
    rgba(255,255,255,0.85) 70%,
    transparent 100%
  );
  -webkit-mask-size: 280% 100%;
  mask-size: 280% 100%;
  -webkit-mask-repeat: no-repeat;
  mask-repeat: no-repeat;
  animation: rainbowWave 5s ease-in-out infinite;
}

@keyframes rainbowWave {
  0%   { -webkit-mask-position: 180% 0; mask-position: 180% 0; opacity: 0.55; }
  40%  { opacity: 0.75; }
  50%  { -webkit-mask-position: -40% 0; mask-position: -40% 0; opacity: 0.75; }
  60%  { opacity: 0.75; }
  100% { -webkit-mask-position: 180% 0; mask-position: 180% 0; opacity: 0.55; }
}

/* ── COPYRIGHT ───────────────────────────────────── */

.copyright {
  position: fixed;
  bottom: 14px;
  width: 100%;
  text-align: center;
  font-size: 13px;
  color: rgba(255,255,255,0.32);
  letter-spacing: 2px;
  z-index: 5;
  pointer-events: auto;
}

.copyright a {
  color: inherit;
  text-decoration: none;
}

.copyright a:hover { color: rgba(255,255,255,0.72); }

</style>
</head>
<body>

<div id="stars"></div>

<img class="rainbow-bg" src="assets/rainbow.png" alt="" aria-hidden="true">

<div class="title-screen" id="titleScreen">

  <div class="hero">
    <img class="heart-float"
         src="assets/guides/01%20TG%20MAIN%20HEART.png"
         alt="Heart character">
    <h1 class="game-title">HEARTABILITY</h1>
  </div>

  <p class="tagline">a world building rehearsal space</p>

  <p class="press-start" id="pressStart">— PRESS START —</p>

  <nav class="menu" id="menu" aria-label="Main menu">
    <a class="rpg-btn play-btn"  href="game-select.html">▶&nbsp;&nbsp;PLAY</a>
    <a class="rpg-btn about-btn" href="about.html">✦&nbsp;&nbsp;ABOUT</a>
  </nav>

</div>

<p class="copyright">©&nbsp;<a href="https://untolduntilmedia.com" target="_blank" rel="noopener">UNTOLD UNTIL MEDIA</a></p>

<script>
(function () {

  /* ── Starfield ────────────────────────────────── */
  const field = document.getElementById('stars');
  for (let i = 0; i < 90; i++) {
    const s = document.createElement('div');
    s.className = 'star';
    const sz = (Math.random() * 5 + 2).toFixed(1);
    s.style.cssText = [
      `width:${sz}px`, `height:${sz}px`,
      `left:${(Math.random() * 100).toFixed(1)}%`,
      `top:${(Math.random() * 100).toFixed(1)}%`,
      `--d:${(1.4 + Math.random() * 3.2).toFixed(2)}s`,
      `--del:${(-Math.random() * 4).toFixed(2)}s`
    ].join(';');
    field.appendChild(s);
  }

  /* ── Open menu ────────────────────────────────── */
  let opened = false;
  const ps   = document.getElementById('pressStart');
  const menu = document.getElementById('menu');

  function openMenu() {
    if (opened) return;
    opened = true;
    ps.style.display = 'none';
    menu.classList.add('open');
  }

  document.addEventListener('click', function (e) {
    if (!e.target.closest('a, .rpg-btn')) openMenu();
  });

  document.addEventListener('keydown', function (e) {
    if (e.key === 'Enter' || e.key === ' ') {
      e.preventDefault();
      openMenu();
    }
  });

})();
</script>
</body>
</html>
