<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Treasure Map — Heartability</title>
<style>
@font-face {
  font-family: "ZoesHandwriting";
  src: url(assets/fonts/ZoesHandwriting-Regular.ttf) format("truetype");
}
@font-face {
  font-family: "ZoesNumbers";
  src: url(assets/fonts/ZoesNumbers-Regular.ttf) format("truetype");
}

@font-face {
  font-family: "PFPixelscript";
  src: url(assets/fonts/PFPixelscriptProRegular.ttf) format("truetype");
}
@import url("https://fonts.googleapis.com/css2?family=VT323&display=swap");

* { margin: 0; padding: 0; box-sizing: border-box; }

:root {
  --wall: #1a2d4a;
  --wall-mid: #1e3a5f;
  --floor-a: #2a4a7a;
  --floor-b: #1e3a5f;
  --panel-bg: #f0ead6;
  --panel-border: #1a2d4a;
  --panel-border-light: #6a9fd8;
  --text-dark: #0a1a2e;
  --text-mid: #1a3a5a;
  --aqua: #3BBFBF;
  --font-hand: "ZoesHandwriting", cursive;
  --font-game: "VT323", monospace;
  --font-nums: "ZoesNumbers", "VT323", monospace;
}

body { min-height: 100vh; background: var(--wall); font-family: var(--font-game); display: flex; flex-direction: column; overflow-x: hidden; -webkit-tap-highlight-color: transparent; }

.room { min-height: 100vh; display: flex; flex-direction: column; }

.wall {
  flex: 1; background: var(--wall); position: relative;
  display: flex; flex-direction: column; align-items: center;
  padding: 24px 16px 0;
  padding-bottom: calc(10dvh + 16px + 24px);
  overflow-y: auto;
}
.wall::before {
  content: ""; position: absolute; inset: 0; pointer-events: none;
  background-image: repeating-linear-gradient(90deg, transparent, transparent 59px, rgba(255,255,255,0.04) 59px, rgba(255,255,255,0.04) 60px);
}

.floor {
  width: 100%; height: 100px;
  background-image: repeating-conic-gradient(var(--floor-a) 0% 25%, var(--floor-b) 0% 50%);
  background-size: 32px 32px; flex-shrink: 0;
  border-top: 4px solid #0a1a2e; position: relative;
}
.floor::after {
  content: ""; position: absolute; inset: 0; pointer-events: none;
  background: linear-gradient(180deg, rgba(0,0,0,0.4) 0%, transparent 55%);
}

.room-title { font-family: "PFPixelscript", cursive; font-size: clamp(32px,5.5vw,58px); color: #6578e2; text-shadow: 2px 3px 0 rgba(0,0,0,0.14); text-align: center; margin-bottom: 4px; position: relative; z-index: 1; }
.room-subtitle { font-family: var(--font-hand); font-size: clamp(13px,2vw,17px); color: #5a9acc; text-align: center; margin-bottom: 14px; position: relative; z-index: 1; }

.topbar { width: 100%; max-width: 960px; display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 10px; position: relative; z-index: 1; gap: 10px; flex-wrap: wrap; }
.instructions { font-family: var(--font-hand); font-size: clamp(12px,1.8vw,16px); color: #a8cce8; line-height: 1.7; }
.instructions .step { color: var(--aqua); }

.rpg-panel {
  position: relative; z-index: 1; background: var(--panel-bg);
  width: 100%; max-width: 960px;
  border: 3px solid var(--panel-border);
  outline: 3px solid var(--panel-border-light); outline-offset: -6px;
  box-shadow: 0 0 0 6px var(--wall-mid), 4px 6px 0 6px rgba(0,0,0,0.4);
  padding: 18px; display: flex; flex-direction: column; gap: 14px;
}
.rpg-panel::before { content: ""; position: absolute; inset: 6px; border: 1px solid var(--panel-border-light); pointer-events: none; }

.section-header { font-family: var(--font-hand); font-size: 17px; color: var(--text-mid); margin-bottom: 7px; letter-spacing: 0.5px; }

.map-input {
  width: 100%; background: #e8e0c8;
  border: 2px solid #8a7a5a; border-right-color: #5a4a2a; border-bottom-color: #5a4a2a;
  border-left-color: #c8b88a; border-top-color: #c8b88a;
  padding: 6px 10px; font-family: var(--font-hand); font-size: 20px; color: var(--text-dark); outline: none;
}
.map-input::placeholder { color: rgba(90,74,42,0.35); }
.map-input:focus { border-color: var(--aqua); outline: 1px solid var(--aqua); }

/* TWO COLUMN — map left, controls right on desktop */
.two-col {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 14px;
}

/* On mobile: stack with controls ABOVE map */
@media (max-width: 680px) {
  .two-col {
    grid-template-columns: 1fr;
    grid-template-rows: auto auto;
  }
  .side-panel { order: 1; }
  .map-col { order: 2; }
}

/* MAP CANVAS */
.map-canvas {
  background: #e8e0c8;
  border: 2px solid #8a7a5a; border-right-color: #5a4a2a; border-bottom-color: #5a4a2a;
  border-left-color: #c8b88a; border-top-color: #c8b88a;
  min-height: 380px; position: relative; overflow: hidden;
  cursor: crosshair;
}

@media (max-width: 680px) {
  .map-canvas { min-height: 300px; }
}

.map-placeholder { position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; pointer-events: none; }
.map-placeholder-text { font-family: var(--font-hand); font-size: 18px; color: rgba(90,74,42,0.25); text-align: center; line-height: 1.8; }

/* MAP ITEMS */
.map-item {
  position: absolute; user-select: none;
  display: flex; flex-direction: column; align-items: center; gap: 2px;
  z-index: 5; cursor: pointer;
  transform: translate(-50%, -50%);
}
.map-item.selected-for-feeling {
  filter: drop-shadow(0 0 6px rgba(59,191,191,0.9));
}
.map-item-wrap { position: relative; display: inline-block; }
.map-item-img { width: 72px; height: auto; display: block; pointer-events: none; }
.map-item-tint {
  position: absolute; inset: -40px;
  pointer-events: none; border-radius: 50%;
  mix-blend-mode: multiply;
}
.map-item-delete {
  position: absolute; top: -10px; right: -10px;
  width: 20px; height: 20px; background: #c04040; color: white;
  border: 1px solid #8a2020;
  font-size: 14px; cursor: pointer; display: none;
  align-items: center; justify-content: center; font-family: var(--font-game);
  z-index: 10; line-height: 1; border-radius: 0;
}
.map-item:hover .map-item-delete { display: flex; }
/* Always show delete on touch devices */
@media (hover: none) {
  .map-item-delete { display: flex !important; top: -8px; right: -8px; width: 18px; height: 18px; font-size: 12px; }
}

.map-item-label {
  font-family: var(--font-hand); font-size: 13px; color: var(--text-dark);
  white-space: nowrap; pointer-events: none; text-align: center; line-height: 1.3;
  background: rgba(240,234,214,0.75); padding: 1px 4px;
}
.map-item-label .terrain-name { display: block; }
.map-item-label .feeling-name { display: block; font-size: 11px; color: #5a4a2a; }

/* SIDE PANEL */
.side-panel { display: flex; flex-direction: column; gap: 12px; }

/* STATUS BAR */
.status-bar {
  background: #e8e0c8;
  border: 2px solid #8a7a5a; border-right-color: #5a4a2a; border-bottom-color: #5a4a2a;
  border-left-color: #c8b88a; border-top-color: #c8b88a;
  padding: 8px 12px; font-family: var(--font-hand); font-size: 15px; color: var(--text-mid);
  min-height: 40px; line-height: 1.4;
}
.status-bar .status-active { color: var(--text-dark); font-size: 17px; }
.status-bar .status-hint { font-size: 13px; color: #7a6a5a; }

/* TERRAIN PALETTE */
.palette-section {
  background: #e8e0c8;
  border: 2px solid #8a7a5a; border-right-color: #5a4a2a; border-bottom-color: #5a4a2a;
  border-left-color: #c8b88a; border-top-color: #c8b88a;
  padding: 10px 12px;
}
.palette-items { display: flex; flex-wrap: wrap; gap: 6px; }
.palette-item {
  display: flex; flex-direction: column; align-items: center; gap: 2px;
  padding: 6px 8px; background: #f0ead6;
  border: 2px solid #8a7a5a; border-right-color: #5a4a2a; border-bottom-color: #5a4a2a;
  border-left-color: #c8b88a; border-top-color: #c8b88a;
  cursor: pointer; user-select: none; transition: filter 0.1s;
}
.palette-item:hover { filter: brightness(1.06); }
.palette-item.active {
  border-color: var(--aqua);
  outline: 2px solid var(--aqua); outline-offset: 1px;
  background: #e0f0f0;
}
.palette-item img { width: 38px; height: 32px; object-fit: contain; pointer-events: none; }
.palette-item-name { font-family: var(--font-game); font-size: 10px; color: var(--text-mid); pointer-events: none; letter-spacing: 0.5px; }

/* WEATHER CATEGORIES */
.weather-categories { display: flex; flex-direction: column; gap: 8px; }
.weather-category {
  padding: 8px 10px;
  border: 2px solid #8a7a5a; border-right-color: #5a4a2a; border-bottom-color: #5a4a2a;
  border-left-color: #c8b88a; border-top-color: #c8b88a;
}
.weather-category.sunny { background: rgba(255,220,80,0.25); border-color: #c8a840; }
.weather-category.rainy { background: rgba(80,140,220,0.25); border-color: #3264b4; }
.weather-category.windy { background: rgba(255,140,40,0.25); border-color: #c86420; }
.weather-category.snowy { background: rgba(220,235,255,0.4); border-color: #96b4d2; }

.weather-cat-header { font-family: var(--font-hand); font-size: 20px; margin-bottom: 6px; }
.sunny .weather-cat-header { color: #7a5a00; }
.rainy .weather-cat-header { color: #1a3a7a; }
.windy .weather-cat-header { color: #7a3a00; }
.snowy .weather-cat-header { color: #2a4a6a; }

.feeling-chips { display: flex; flex-wrap: wrap; gap: 5px; }
.feeling-chip {
  padding: 4px 10px; font-family: var(--font-game); font-size: 13px;
  cursor: pointer; letter-spacing: 0.5px; border: 2px solid;
  user-select: none; transition: filter 0.1s;
}
.feeling-chip:hover { filter: brightness(0.92); }
.feeling-chip.active { outline: 2px solid var(--text-dark); outline-offset: 1px; }

.sunny .feeling-chip { background: rgba(255,220,80,0.4); border-color: #c8a840; color: #5a3a00; }
.rainy .feeling-chip { background: rgba(80,140,220,0.3); border-color: #3264b4; color: #0a1a5a; }
.windy .feeling-chip { background: rgba(255,140,40,0.3); border-color: #c86420; color: #5a2000; }
.snowy .feeling-chip { background: rgba(220,235,255,0.6); border-color: #96b4d2; color: #1a2a4a; }

/* BUTTONS */
.action-row { display: flex; gap: 8px; flex-wrap: wrap; }
.rpg-btn {
  background: var(--wall-mid); border: 3px solid var(--panel-border);
  outline: 2px solid var(--panel-border-light); outline-offset: -4px;
  box-shadow: 2px 3px 0 2px rgba(0,0,0,0.4);
  padding: 7px 16px; font-family: var(--font-game); font-size: 15px;
  color: #a8cce8; cursor: pointer; letter-spacing: 1px;
}
.rpg-btn:hover { filter: brightness(1.15); }
.rpg-btn:active { transform: translate(2px,3px); box-shadow: none; }
.rpg-btn.primary { background: var(--aqua); color: #0a1a2e; }

/* READING */
.reading-panel {
  display: none; background: #e8e0c8;
  border: 2px solid #8a7a5a; border-right-color: #5a4a2a; border-bottom-color: #5a4a2a;
  border-left-color: #c8b88a; border-top-color: #c8b88a;
  padding: 14px 16px;
}
.reading-panel.show { display: block; }
.reading-title { font-family: var(--font-hand); font-size: 24px; color: var(--text-dark); margin-bottom: 6px; }
.reading-text { font-family: var(--font-game); font-size: 14px; color: var(--text-mid); line-height: 1.6; }

/* ── GAME ROOM OVERLAY ─────────────────────────────────────────── */
body, .wall { background: #f5f0ea; }

.gr-floor {
  position: fixed; bottom: 0; left: 0;
  width: 100%; height: 10dvh;
  z-index: 1; pointer-events: none;
}
.gr-floor img {
  width: 100%; height: 100%;
  object-fit: cover; object-position: top center;
  display: block;
}
.gr-baseboard {
  position: fixed; bottom: 10dvh; left: 0;
  width: 100%; height: 16px;
  z-index: 3; pointer-events: none;
  background: #cdc8bd;
  box-shadow: 0 -3px 0 0 #c7c2b7, 0 4px 0 0 #b8b3a8, 0 7px 5px rgba(0,0,0,0.15);
}
.gr-heart {
  position: fixed; left: 30px; bottom: calc(10dvh - 35px);
  width: clamp(100px, 13vw, 190px);
  display: flex; align-items: flex-end;
  cursor: default; z-index: 5;
}
.gr-heart img {
  display: block; width: 100%; height: auto;
  filter: drop-shadow(0 4px 10px rgba(0,0,0,0.28));
  animation:
    gr-intro-wiggle 0.85s ease-out 0.35s 1 backwards,
    gr-idle-pulse   3.6s ease-in-out 1.5s infinite;
}
.gr-bubble {
  position: absolute;
  background: rgba(255,255,255,0.96);
  border-radius: 20px; padding: 14px 22px;
  font-family: "ZoesHandwriting", cursive;
  font-size: clamp(14px, 1.6vw, 20px);
  color: #5a3a7a; text-align: center; line-height: 1.4;
  filter: drop-shadow(2px 4px 8px rgba(0,0,0,0.18));
  z-index: 6; white-space: nowrap;
  left: calc(100% + 20px); bottom: 30%;
  pointer-events: none;
}
.gr-bubble::after {
  content: ''; position: absolute;
  top: 50%; left: -8px; transform: translateY(-50%);
  width: 8px; height: 8px; border-radius: 50%;
  background: rgba(255,255,255,0.96);
  box-shadow:
    -14px 0 0 -2px rgba(255,255,255,0.96),
    -24px 0 0 -4px rgba(255,255,255,0.96);
}
@keyframes gr-intro-wiggle {
  0%   { transform: rotate(0deg) scale(1); }
  18%  { transform: rotate(-11deg) scale(1.06); }
  38%  { transform: rotate(11deg) scale(1.06); }
  58%  { transform: rotate(-6deg) scale(1.02); }
  78%  { transform: rotate(6deg) scale(1.02); }
  100% { transform: rotate(0deg) scale(1); }
}
@keyframes gr-idle-pulse {
  0%,100% { transform: translateY(0)    rotate(-2deg) scale(1); }
  50%      { transform: translateY(-8px) rotate(2deg)  scale(1.03); }
}
</style>
</head>
<body>
<div class="room">
  <div class="wall">
    <h1 class="room-title">Treasure Map</h1>

    <div class="topbar">
      <div style="display:flex;gap:8px;flex-shrink:0;">
        <button class="rpg-btn" onclick="clearMap()">&#x25BA; CLEAR</button>
        <button class="rpg-btn primary" onclick="readMap()">&#x2605; READ MAP</button>
      </div>
    </div>

    <div class="rpg-panel">

      <div>
        <div class="section-header">name your map</div>
        <input class="map-input" id="mapName" type="text" placeholder="the map of..." maxlength="60" oninput="saveState()">
      </div>

      <div class="two-col">

        <!-- SIDE PANEL — terrain + feelings (above map on mobile) -->
        <div class="side-panel">

          <div class="status-bar" id="statusBar">
            tap a terrain piece to select it, then tap the map to place it
          </div>

          <div class="palette-section">
            <div class="section-header">terrain</div>
            <div class="palette-items" id="terrainPalette"></div>
          </div>

          <div>
            <div class="section-header">feelings</div>
            <div class="weather-categories" id="weatherCategories"></div>
          </div>

        </div>

        <!-- MAP CANVAS — below controls on mobile -->
        <div class="map-col">
          <div class="section-header">your map</div>
          <div class="map-canvas" id="mapCanvas">
            <div class="map-placeholder" id="mapPlaceholder">
              <div class="map-placeholder-text">your map will appear here</div>
            </div>
          </div>
        </div>

      </div>

      <div class="reading-panel" id="readingPanel">
        <div class="reading-title" id="readingTitle"></div>
        <div class="reading-text" id="readingText"></div>
      </div>

    </div>
  </div>
  <div class="floor"></div>
</div>

<script>
const TERRAIN_IMGS = {
  dunes: "assets/elements/maps/dunes.png",
  forest: "assets/elements/maps/forest.png",
  meadow: "assets/elements/maps/meadow.png",
  mountains: "assets/elements/maps/mountains.png",
  ocean: "assets/elements/maps/ocean.png",
  orchard: "assets/elements/maps/orchard.png",
  plateu: "assets/elements/maps/plateu.png",
  pond: "assets/elements/maps/pond.png",
  river: "assets/elements/maps/river.png",
  spring: "assets/elements/maps/spring.png",
  waterfall: "assets/elements/maps/waterfall.png",
};


const TERRAIN = [
  { id:"mountains", label:"mountains" },
  { id:"forest", label:"forest" },
  { id:"orchard", label:"orchard" },
  { id:"meadow", label:"meadow" },
  { id:"dunes", label:"dunes" },
  { id:"pond", label:"pond" },
  { id:"river", label:"river" },
  { id:"ocean", label:"ocean" },
  { id:"waterfall", label:"waterfall" },
  { id:"spring", label:"spring" },
  { id:"plateu", label:"plateau" },
];

const WEATHER_CATS = [
  {
    id:"sunny", label:"sunny", cls:"sunny",
    tint:"rgba(255, 210, 60, 0.5)",
    feelings:["trust","peace","joy","hope","confidence"]
  },
  {
    id:"rainy", label:"rainy", cls:"rainy",
    tint:"rgba(60, 120, 220, 0.4)",
    feelings:["shadows","worry","fear","depression","regret"]
  },
  {
    id:"windy", label:"windy", cls:"windy",
    tint:"rgba(255, 130, 30, 0.45)",
    feelings:["surprise","curiosity","inspiration","excitement","courage"]
  },
  {
    id:"snowy", label:"snowy", cls:"snowy",
    tint:"rgba(200, 225, 255, 0.6)",
    feelings:["anger","avoidance","bitterness","apathy","shock"]
  },
];

const READINGS = {
  sunny: { title:"a bright season", text:"The light is favorable right now. Things that felt obscure are becoming clearer. This is a good time to move toward what you want." },
  rainy: { title:"a season of softening", text:"Rain dissolves what was hardened. Something in you is releasing. Let it go." },
  windy: { title:"a season of motion", text:"Things are moving fast. You may not be able to control the direction but you can choose what to hold close." },
  snowy: { title:"a season of stillness", text:"The cold quiets everything. This is not absence — it is preservation. What are you keeping safe under the surface?" },
};

let state = { name:"", items:[], activeTerrain:null, activeFeeling:null, activeCat:null, activeTint:null };

function loadState() {
  try { const s = localStorage.getItem("hb-map"); if(s) state = JSON.parse(s); } catch(e) {}
}
function saveState() {
  state.name = document.getElementById("mapName").value;
  try { localStorage.setItem("hb-map", JSON.stringify(state)); } catch(e) {}
}

function updateStatus() {
  const bar = document.getElementById("statusBar");
  if(state.activeTerrain && state.activeFeeling) {
    bar.innerHTML = `<span class="status-active">placing: ${state.activeTerrain.label}</span> &nbsp; <span class="status-hint">tap map to place · feeling: ${state.activeFeeling} will auto-apply</span>`;
  } else if(state.activeTerrain) {
    bar.innerHTML = `<span class="status-active">placing: ${state.activeTerrain.label}</span> &nbsp; <span class="status-hint">tap the map to place it</span>`;
  } else if(state.activeFeeling) {
    bar.innerHTML = `<span class="status-active">feeling: ${state.activeFeeling}</span> &nbsp; <span class="status-hint">tap a terrain piece on your map to apply it</span>`;
  } else {
    bar.innerHTML = `tap a terrain piece to select it, then tap the map to place it`;
  }
}

// BUILD TERRAIN PALETTE
function buildTerrain() {
  const tp = document.getElementById("terrainPalette");
  TERRAIN.forEach(t => {
    const el = document.createElement("div");
    el.className = "palette-item";
    el.id = "terrain-btn-" + t.id;
    el.innerHTML = `<img src="${TERRAIN_IMGS[t.id]}" alt="${t.label}"><div class="palette-item-name">${t.label}</div>`;
    el.addEventListener("click", () => selectTerrain(t, el));
    tp.appendChild(el);
  });
}

function selectTerrain(t, el) {
  // Toggle off if same
  if(state.activeTerrain && state.activeTerrain.id === t.id) {
    state.activeTerrain = null;
    el.classList.remove("active");
    updateStatus(); return;
  }
  // Deselect all terrain
  document.querySelectorAll(".palette-item").forEach(p => p.classList.remove("active"));
  state.activeTerrain = t;
  el.classList.add("active");
  // Also deselect any active feeling target mode
  state.activeFeeling = null;
  state.activeCat = null;
  state.activeTint = null;
  document.querySelectorAll(".feeling-chip").forEach(c => c.classList.remove("active"));
  updateStatus();
}

// BUILD WEATHER CATEGORIES
function buildWeather() {
  const wc = document.getElementById("weatherCategories");
  WEATHER_CATS.forEach(cat => {
    const div = document.createElement("div");
    div.className = `weather-category ${cat.cls}`;
    div.innerHTML = `<div class="weather-cat-header">${cat.label}</div><div class="feeling-chips"></div>`;
    wc.appendChild(div);

    cat.feelings.forEach(f => {
      const chip = document.createElement("div");
      chip.className = "feeling-chip";
      chip.textContent = f;
      chip.addEventListener("click", () => selectFeeling(f, cat, chip));
      div.querySelector(".feeling-chips").appendChild(chip);
    });
  });
}

function selectFeeling(feeling, cat, chipEl) {
  if(state.activeFeeling === feeling) {
    state.activeFeeling = null; state.activeCat = null; state.activeTint = null;
    document.querySelectorAll(".feeling-chip").forEach(c => c.classList.remove("active"));
    // Restore terrain selection mode if terrain was active
    updateStatus(); return;
  }
  // Selecting a feeling also clears terrain selection
  state.activeTerrain = null;
  document.querySelectorAll(".palette-item").forEach(p => p.classList.remove("active"));

  document.querySelectorAll(".feeling-chip").forEach(c => c.classList.remove("active"));
  state.activeFeeling = feeling;
  state.activeCat = cat.id;
  state.activeTint = cat.tint;
  chipEl.classList.add("active");
  updateStatus();
}

// TAP MAP TO PLACE TERRAIN
document.addEventListener("DOMContentLoaded", () => {
  const canvas = document.getElementById("mapCanvas");

  canvas.addEventListener("click", e => {
    if(!state.activeTerrain) return;
    const rect = canvas.getBoundingClientRect();
    const x = e.clientX - rect.left;
    const y = e.clientY - rect.top;
    placeItem(state.activeTerrain.id, state.activeTerrain.label, x, y,
      state.activeFeeling, state.activeTint);
  });
});

function applyTint(tintDiv, tint) {
  tintDiv.style.background = tint
    ? `radial-gradient(circle, ${tint} 20%, transparent 72%)`
    : "";
}

function placeItem(id, label, x, y, feeling, tint) {
  const canvas = document.getElementById("mapCanvas");
  document.getElementById("mapPlaceholder").style.display = "none";

  const el = document.createElement("div");
  el.className = "map-item";
  el.style.left = x + "px";
  el.style.top = y + "px";
  el.dataset.id = id;
  el.dataset.label = label;
  el.dataset.feeling = feeling || "";
  el.dataset.tint = tint || "";

  const wrap = document.createElement("div");
  wrap.className = "map-item-wrap";

  const img = document.createElement("img");
  img.className = "map-item-img";
  img.src = TERRAIN_IMGS[id];

  const tintDiv = document.createElement("div");
  tintDiv.className = "map-item-tint";
  applyTint(tintDiv, tint);

  const del = document.createElement("div");
  del.className = "map-item-delete";
  del.textContent = "×";
  del.addEventListener("click", e => {
    e.stopPropagation();
    el.remove();
    saveMapItems();
    if(canvas.querySelectorAll(".map-item").length === 0) {
      document.getElementById("mapPlaceholder").style.display = "flex";
    }
  });

  wrap.appendChild(img);
  wrap.appendChild(tintDiv);
  wrap.appendChild(del);
  el.appendChild(wrap);

  const labelDiv = document.createElement("div");
  labelDiv.className = "map-item-label";
  labelDiv.innerHTML = `<span class="terrain-name">${label}</span>${feeling ? `<span class="feeling-name">of ${feeling}</span>` : ''}`;
  el.appendChild(labelDiv);

  // Click to apply active feeling
  el.addEventListener("click", e => {
    if(e.target === del) return;
    if(state.activeFeeling) {
      el.dataset.feeling = state.activeFeeling;
      el.dataset.tint = state.activeTint;
      applyTint(tintDiv, state.activeTint);
      labelDiv.innerHTML = `<span class="terrain-name">${label}</span><span class="feeling-name">of ${state.activeFeeling}</span>`;
      el.classList.remove("selected-for-feeling");
      saveMapItems();
    }
  });

  canvas.appendChild(el);
  saveMapItems();
}

function saveMapItems() {
  const canvas = document.getElementById("mapCanvas");
  state.items = Array.from(canvas.querySelectorAll(".map-item")).map(el => ({
    id: el.dataset.id, label: el.dataset.label,
    feeling: el.dataset.feeling, tint: el.dataset.tint,
    x: parseFloat(el.style.left), y: parseFloat(el.style.top),
  }));
  saveState();
}

function restoreItems() {
  if(state.items && state.items.length > 0) {
    document.getElementById("mapPlaceholder").style.display = "none";
    state.items.forEach(item => placeItem(item.id, item.label, item.x, item.y, item.feeling||null, item.tint||null));
  }
}

function readMap() {
  const cats = {};
  state.items.forEach(item => {
    if(item.feeling) {
      const cat = WEATHER_CATS.find(c => c.feelings.includes(item.feeling));
      if(cat) cats[cat.id] = (cats[cat.id]||0) + 1;
    }
  });
  const name = document.getElementById("mapName").value;
  const mapName = name ? `"${name}"` : "your map";
  let catId = Object.keys(cats).sort((a,b) => cats[b]-cats[a])[0];
  if(!catId) catId = state.activeCat;
  const panel = document.getElementById("readingPanel");
  if(!catId) {
    document.getElementById("readingTitle").textContent = "apply some feelings first";
    document.getElementById("readingText").textContent = "Select a feeling and tap your terrain pieces to give them color. Then come back here.";
  } else {
    const r = READINGS[catId];
    document.getElementById("readingTitle").textContent = `${mapName}: ${r.title}`;
    document.getElementById("readingText").textContent = r.text;
  }
  panel.classList.add("show");
  panel.scrollIntoView({behavior:"smooth", block:"nearest"});
}

function clearMap() {
  const canvas = document.getElementById("mapCanvas");
  canvas.querySelectorAll(".map-item").forEach(el => el.remove());
  document.getElementById("mapPlaceholder").style.display = "flex";
  document.getElementById("readingPanel").classList.remove("show");
  document.getElementById("mapName").value = "";
  document.querySelectorAll(".feeling-chip").forEach(c => c.classList.remove("active"));
  document.querySelectorAll(".palette-item").forEach(p => p.classList.remove("active"));
  state = { name:"", items:[], activeTerrain:null, activeFeeling:null, activeCat:null, activeTint:null };
  saveState();
  updateStatus();
}

loadState();
buildTerrain();
buildWeather();
if(state.name) document.getElementById("mapName").value = state.name;
restoreItems();
updateStatus();
</script>
